<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小説リーダー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#11d1d1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小説">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho+B1:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;500&display=swap');

:root {
  --bg: #ffffff;
  --ink: #1a1208;
  --accent: #008080;
  --accent2: #009999;
  --border: #e8e8e8;
  --page-max: 720px;
  --font-body: 'Shippori Mincho B1','Noto Serif JP',serif;
  --top-h: 52px;
  --bot-h: 0px;
  --eb-h: 0px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{
  background:var(--bg);
  font-family:var(--font-body);
}

/* ══════ TOP BAR ══════ */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--top-h);
  background:#fff;border-bottom:1px solid #eee;
  display:flex;align-items:center;padding:0 6px;z-index:100;
  transition:background .3s,border-color .3s;
}
#topbar.bg-active{
  background:transparent;
  border-bottom-color:rgba(0,0,0,0.08);
}
#topbar-title{
  flex:1;text-align:center;font-family:'Noto Sans JP',sans-serif;
  font-size:15px;font-weight:500;color:#222;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;
}
#topbar-done{
  background:none;border:none;color:#555;width:36px;height:36px;
  border-radius:6px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#topbar-done:hover{background:#f0f0f0;}
#topbar-search{
  background:none;border:none;color:#555;width:36px;height:36px;
  border-radius:6px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#topbar-search:hover{background:#f0f0f0;}
#topbar-edit-done{
  background:none;border:none;color:#555;width:36px;height:36px;
  border-radius:6px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#topbar-edit-done:hover{background:#f0f0f0;}
#topbar-back-toc{
  background:none;border:none;color:#555;width:36px;height:36px;
  border-radius:6px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#topbar-back-toc:hover{background:#f0f0f0;}
#topbar-page-indicator{
  font-family:'Noto Sans JP',sans-serif;font-size:12px;color:#999;
  flex-shrink:0;padding:0 4px;white-space:nowrap;
}

/* ══════ SEARCH OVERLAY ══════ */
#search-overlay{
  position:fixed;top:0;left:0;right:0;height:var(--top-h);
  background:#fff;border-bottom:1px solid #eee;z-index:300;
  display:flex;align-items:center;gap:6px;padding:0 10px;
  transform:translateY(-100%);
  transition:transform .2s cubic-bezier(.25,.46,.45,.94),background .3s;
}
#search-overlay.bg-active{
  background:transparent;
  border-bottom-color:transparent;
}
#search-overlay.open{transform:translateY(0);}
#search-input{
  flex:1;border:none;outline:none;font-family:'Noto Sans JP',sans-serif;
  font-size:15px;color:#222;background:transparent;
}
#search-input::placeholder{color:#bbb;}
#search-count{font-family:'Noto Sans JP',sans-serif;font-size:12px;color:#999;white-space:nowrap;min-width:36px;}
.s-nav{background:none;border:none;color:#555;width:32px;height:32px;font-size:15px;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.s-nav:hover{background:#f0f0f0;}
.s-nav:disabled{opacity:.3;cursor:default;}
#search-close{background:none;border:none;color:#999;font-size:18px;cursor:pointer;padding:4px 6px;}
mark.sh{background:#ffe082;color:#222;border-radius:2px;}
mark.sh.current{background:#ff8f00;color:#fff;}

/* ══════ BACKGROUND IMAGE ══════ */
#bg-image-layer{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:0;
  pointer-events:none;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:1;
}
#bg-overlay-layer{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:1;
  pointer-events:none;
  background:rgba(255,255,255,0.75);
}
#viewport{ z-index:2; }
#topbar{ z-index:100; }
#botbar{ z-index:90; }
#side-panel,#panel-ov{ z-index:200; }
#modal-ov{ z-index:700; }
#eb-color-popup{ z-index:600; }
#search-overlay{ z-index:300; }
.page{ background:transparent !important; }
#viewport{
  position:fixed;
  top:var(--top-h);bottom:var(--bot-h);
  left:0;right:0;
  overflow:hidden;
}

/* ══════ PAGE SLIDE ANIMATION ══════ */
/* Pages are stacked; slide up/down to transition */
.page{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:var(--bg);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  will-change:transform;
}
.page::-webkit-scrollbar{width:3px;}
.page::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}

.page.cur   { z-index:10; transform:translateY(0);   transition:none; }
.page.hidden{ display:none; }
/* ── 縦スライド (スクロール方向) ── */
.page.slide-in-below { z-index:11; transform:translateY(100%); transition:none; }
.page.slide-in-below.go { transform:translateY(0); transition:transform .42s cubic-bezier(.25,.46,.45,.94); }
.page.slide-in-above { z-index:11; transform:translateY(-100%); transition:none; }
.page.slide-in-above.go { transform:translateY(0); transition:transform .42s cubic-bezier(.25,.46,.45,.94); }
.page.slide-out-down { z-index:10; transform:translateY(0); transition:none; }
.page.slide-out-down.go { transform:translateY(100%); transition:transform .42s cubic-bezier(.25,.46,.45,.94); }
.page.slide-out-up { z-index:10; transform:translateY(0); transition:none; }
.page.slide-out-up.go { transform:translateY(-100%); transition:transform .42s cubic-bezier(.25,.46,.45,.94); }
/* ── 横スライド (左右スワイプ) ── */
.page.slide-in-right { z-index:11; transform:translateX(100%); transition:none; }
.page.slide-in-right.go { transform:translateX(0); transition:transform .38s cubic-bezier(.25,.46,.45,.94); }
.page.slide-in-left  { z-index:11; transform:translateX(-100%); transition:none; }
.page.slide-in-left.go  { transform:translateX(0); transition:transform .38s cubic-bezier(.25,.46,.45,.94); }
.page.slide-out-left  { z-index:10; transform:translateX(0); transition:none; }
.page.slide-out-left.go  { transform:translateX(-100%); transition:transform .38s cubic-bezier(.25,.46,.45,.94); }
.page.slide-out-right { z-index:10; transform:translateX(0); transition:none; }
.page.slide-out-right.go { transform:translateX(100%); transition:transform .38s cubic-bezier(.25,.46,.45,.94); }

/* page-turn hint overlay at scroll edges */
.page-hint{ display:none !important; }
.page-hint.top,.page-hint.bot,.page-hint.show{ display:none !important; }

.page-inner{
  max-width:var(--page-max);margin:0 auto;
  padding:28px 24px 60px;
  min-height:100%;position:relative;
}

/* ══════ SUB-PAGE (KakaoPage-style virtual state.pages) ══════ */
.subpage-group{
  display:none;
  animation:none;
}
.subpage-group.active{
  display:block;
}
.subpage-group.fade-in{
  animation:subpageFadeIn .38s cubic-bezier(.25,.46,.45,.94) both;
}
.subpage-group.slide-up{
  animation:subpageSlideUp .42s cubic-bezier(.25,.46,.45,.94) both;
}
@keyframes subpageFadeIn{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes subpageSlideUp{
  from{opacity:0;transform:translateY(32px);}
  to{opacity:1;transform:translateY(0);}
}

/* Sub-page progress dots */
#subpage-dots{
  position:fixed;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:5px;
  z-index:50;
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
}
#subpage-dots.show{opacity:1;}
.sp-dot{
  width:5px;height:5px;border-radius:50%;
  background:#ccc;transition:background .2s,transform .2s;
}
.sp-dot.active{background:var(--accent);transform:scale(1.4);}


/* ══════ VIEW / EDIT MODE ══════ */
#viewport:not(.edit-mode) .page-editor{
  cursor:default;
  user-select:none;
  -webkit-user-select:none;
}
#viewport.edit-mode .page-editor{
  cursor:text;
}
/* 閲覧モード時のダブルタップヒント（初回のみ薄く表示） */
#dbtap-hint{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:#fff;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  padding:6px 16px;border-radius:20px;
  pointer-events:none;
  opacity:0;transition:opacity .4s;
  z-index:80;white-space:nowrap;
}
#dbtap-hint.show{opacity:1;}

/* ══════ PAGE LABEL ══════ */
.pnl{position:absolute;top:8px;right:10px;color:#ccc;font-size:11px;font-family:'Noto Sans JP',sans-serif;pointer-events:none;user-select:none;}

/* ══════ SINGLE CONTENTEDITABLE EDITOR ══════ */
.page-editor{
  outline:none;
  /* no border, no background */
  min-height:100%;
}
/* Each paragraph = <p> or <div> inside editor */
.page-editor p, .page-editor div.para-img-wrap {
  line-height:2.0;
  letter-spacing:.06em;
  word-break:break-all;
  white-space:pre-wrap;
  min-height:1.5em;
  margin-bottom:24px;
  border-radius:4px;
  padding:2px 0;
  position:relative;
}
/* image wrapper (not contenteditable content) */
.page-editor div.para-img-wrap {
  white-space:normal;
  line-height:1;
  min-height:0;
  position:relative;
}
.para-image{max-width:100%;border-radius:6px;display:block;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
/* 画像削除ボタン（編集モードで画像タップ時のみ表示） */
.para-img-delete{
  position:absolute;
  top:6px;right:6px;
  background:rgba(192,0,0,0.85);
  color:#fff;
  border:none;
  border-radius:50%;
  width:28px;height:28px;
  font-size:14px;line-height:1;
  cursor:pointer;
  padding:0;
  display:none;
  z-index:5;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  font-family:'Noto Sans JP',sans-serif;
}
.para-img-wrap.show-delete .para-img-delete{display:block;}

/* empty editor hint */
.page-editor:empty::before,
.page-editor p:only-child:empty::before {
  content: '下の ＋文 ボタンで段落、🖼 ボタンで挿絵を追加';
  color:#bbb;font-family:'Noto Sans JP',sans-serif;font-size:13px;
  pointer-events:none;
}

/* ══════ BOTTOM EDIT BAR ══════ */
#botbar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid #eee;
  z-index:90;
  display:flex;flex-direction:column;
  transition:transform .22s cubic-bezier(.25,.46,.45,.94);
}

/* edit row inside botbar */
#botbar-edit-row{
  height:0;overflow:hidden;
  border-top:0px solid #eee;
  display:flex;align-items:stretch;
  transition:height .22s cubic-bezier(.25,.46,.45,.94), border-top-width .22s;
  position:relative;
}
#botbar-edit-row.visible{
  height:38px;
  border-top-width:1px;
}

/* 区切り・段落ボタンを右端に固定 */
#eb-fixed-right{
  display:flex;align-items:center;
  flex-shrink:0;
  border-left:1px solid #e0e0e0;
  background:#fff;
  height:100%;
  z-index:5;
}

/* ══════════════════════════════════════
   EDIT BAR
══════════════════════════════════════ */
#eb-scroll{
  display:flex;align-items:center;gap:0;
  overflow-x:scroll;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
  padding:0 4px;flex:1;
  scrollbar-width:none;
}
#eb-scroll::-webkit-scrollbar{display:none;}

.eb-sep{width:1px;height:20px;background:#c8c8c8;margin:0 2px;flex-shrink:0;}

.eb-btn{
  flex-shrink:0;
  background:transparent;border:none;
  color:#333;
  width:28px;height:38px;
  border-radius:0;
  font-size:16px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:background .1s;
  -webkit-tap-highlight-color:transparent;
  padding:0;
  position:relative;
}
.eb-btn:active{background:rgba(0,0,0,0.07);}
.eb-btn.active .eb-icon{color:var(--accent);}
.eb-icon{font-size:15px;line-height:1;display:block;}
.eb-lbl{display:none;}

.eb-align-wrap{display:flex;flex-shrink:0;align-items:center;}
.eb-abtn{
  flex-shrink:0;
  background:transparent;border:none;color:#333;
  width:26px;height:38px;font-size:15px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  -webkit-tap-highlight-color:transparent;transition:background .1s;
}
.eb-abtn:active{background:rgba(0,0,0,0.07);}
.eb-abtn.active{color:var(--accent);}
.eb-abtn .eb-lbl{display:none;}

.eb-stepper{display:flex;align-items:center;flex-shrink:0;}
.eb-step{
  background:transparent;border:none;color:#333;
  width:24px;height:38px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:background .1s;
}
.eb-step:active{background:rgba(0,0,0,0.07);}
.eb-sizeval{
  color:#333;font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:500;
  min-width:22px;text-align:center;user-select:none;
  pointer-events:none;
}

.eb-color-wrap{
  position:relative;flex-shrink:0;
  width:28px;height:38px;
  display:flex;align-items:center;justify-content:center;
}
#eb-color-btn{
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(0,0,0,0.15);
  cursor:pointer;
  background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s;
  display:block;
}
#eb-color-btn:active{transform:scale(.93);}

#eb-color-popup{
  position:fixed;
  background:#fff;
  border-radius:14px;
  box-shadow:0 6px 28px rgba(0,0,0,0.22);
  padding:12px 14px;
  z-index:600;
  display:none;
  flex-direction:column;
  gap:10px;
  min-width:200px;
}
#eb-color-popup.show{display:flex;}
.ecp-title{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#888;letter-spacing:.1em;}
.ecp-dots{display:flex;flex-wrap:wrap;gap:8px;}
.ecp-dot{
  width:28px;height:28px;border-radius:50%;
  border:2.5px solid transparent;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
  transition:transform .12s,border-color .12s;
  flex-shrink:0;
}
.ecp-dot:active{transform:scale(.9);}
.ecp-dot.active{border-color:#009999;}
.ecp-custom-row{display:flex;align-items:center;gap:8px;}
.ecp-custom-swatch{
  width:28px;height:28px;border-radius:50%;
  border:2px solid #ccc;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;background:#f5f5f5;
  position:relative;overflow:hidden;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
}
.ecp-custom-swatch input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ecp-custom-label{font-family:'Noto Sans JP',sans-serif;font-size:12px;color:#555;}

/* ══════ SIDE PANEL ══════ */
#side-panel{
  position:fixed;top:var(--top-h);right:-340px;width:300px;bottom:var(--bot-h);
  background:#fff;border-left:none;
  transition:right .28s cubic-bezier(.25,.46,.45,.94),background .3s;
  z-index:200;
  display:flex;flex-direction:column;
  padding:0;
  box-shadow:none;
}
#side-panel.bg-active{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
#side-panel.open{right:0;}
#panel-header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--top-h);
  padding:0 12px 0 20px;
  background:#fff;
  border-bottom:1px solid #eee;
}
#side-panel.bg-active #panel-header{
  background:transparent;
  border-bottom-color:rgba(0,0,0,0.08);
}
.panel-header-title{
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:500;color:#222;
}
.panel-close-btn{
  background:none;border:none;color:#555;
  width:36px;height:36px;border-radius:6px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s;flex-shrink:0;
}
.panel-close-btn:hover{background:#f0f0f0;}
#panel-body{
  flex:1;overflow-y:auto;
  padding:20px 20px 32px;
}
#panel-body::-webkit-scrollbar{width:0;}
.ps{margin-bottom:28px;}
.ps:first-child{margin-top:0;}
.ps:last-child{margin-bottom:0;}
.pl{
  color:#aaa;font-family:'Noto Sans JP',sans-serif;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  margin-bottom:12px;
}
.pr{display:flex;gap:5px;flex-wrap:wrap;}
.ob{
  flex:1;background:none;border:none;border-bottom:2px solid #eee;
  color:#888;padding:7px 4px 6px;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  cursor:pointer;text-align:center;transition:all .15s;min-width:44px;
}
.ob:hover{color:#333;border-bottom-color:#bbb;}
.ob.active{color:#008080;border-bottom-color:#008080;font-weight:600;}
.sr{display:flex;align-items:center;gap:10px;}
.sr input[type=range]{
  flex:1;-webkit-appearance:none;height:2px;
  background:#e8e8e8;border-radius:1px;outline:none;
}
.sr input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:#fff;cursor:pointer;
  border:2px solid #008080;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
}
.sv{color:#008080;font-family:'Noto Sans JP',sans-serif;font-size:12px;min-width:36px;text-align:right;}
/* font selector */
.font-list{display:flex;flex-direction:column;gap:0;}
.font-btn{
  background:none;border:none;border-bottom:1px solid #f0f0f0;
  padding:11px 0;cursor:pointer;text-align:left;
  color:#555;font-size:14px;transition:color .12s;
  display:flex;align-items:center;justify-content:space-between;
}
.font-btn:last-child{border-bottom:none;}
.font-btn:hover{color:#008080;}
.font-btn.active{color:#008080;}
.font-btn.active::after{content:'✓';font-size:12px;color:#008080;}
/* font file load */
.font-load-row{
  display:flex;align-items:center;gap:10px;margin-top:14px;
  padding-top:14px;border-top:1px solid #f0f0f0;
}
.font-load-btn{
  flex:1;background:none;border:1px solid #e0e0e0;
  color:#777;padding:8px 10px;border-radius:6px;
  font-family:'Noto Sans JP',sans-serif;font-size:11px;
  cursor:pointer;transition:border-color .12s,color .12s;
  white-space:nowrap;
}
.font-load-btn:hover{border-color:#aaa;color:#444;}
.font-load-name{
  font-family:'Noto Sans JP',sans-serif;font-size:11px;
  color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;
}
/* bg image controls */
.ov-toggle-row{display:flex;gap:6px;margin-bottom:14px;}
.ov-tog{
  flex:1;background:none;border:none;border-bottom:2px solid #eee;
  color:#888;padding:7px 4px 6px;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  cursor:pointer;text-align:center;transition:all .15s;
}
.ov-tog:hover{color:#333;border-bottom-color:#bbb;}
.ov-tog.active{color:#008080;border-bottom-color:#008080;font-weight:600;}
.bg-load-btn{
  width:100%;background:none;border:1px solid #e0e0e0;
  color:#777;padding:9px 10px;border-radius:6px;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  cursor:pointer;transition:border-color .12s,color .12s;
  margin-bottom:14px;
}
.bg-load-btn:hover{border-color:#aaa;color:#444;}

/* ══════════════════════════════════════
   IndexedDB
══════════════════════════════════════ */
const DB_NAME='novel-reader-db';
const DB_STORE='novelData';
const DB_IMG_STORE='imageStore';
const DB_LIBRARY_STORE='libraryData'; // 複数小説ライブラリ
const DB_KEY='current';
let _db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    if(_db){resolve(_db);return;}
    const req=indexedDB.open(DB_NAME,3); // version 3 for libraryData
    req.onupgradeneeded=(e)=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(DB_STORE)){
        db.createObjectStore(DB_STORE);
      }
      if(!db.objectStoreNames.contains(DB_IMG_STORE)){
        db.createObjectStore(DB_IMG_STORE);
      }
      if(!db.objectStoreNames.contains(DB_LIBRARY_STORE)){
        db.createObjectStore(DB_LIBRARY_STORE);
      }
    };
    req.onsuccess=()=>{_db=req.result;resolve(_db);};
    req.onerror=()=>reject(req.error);
  });
}

function dbGet(){
  return openDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const req=tx.objectStore(DB_STORE).get(DB_KEY);
    req.onsuccess=()=>resolve(req.result||null);
    req.onerror=()=>reject(req.error);
  }));
}

function dbPut(value){
  return openDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(value,DB_KEY);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  }));
}

function dbClear(){
  return openDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction([DB_STORE,DB_IMG_STORE],'readwrite');
    tx.objectStore(DB_STORE).clear();
    tx.objectStore(DB_IMG_STORE).clear();
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  }));
}

/* ── ライブラリDB操作 ── */
// ライブラリ（全小説リスト）の取得
function libDbGetAll(){
  return openDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_LIBRARY_STORE,'readonly');
    const store=tx.objectStore(DB_LIBRARY_STORE);
    const req=store.getAll();
    req.onsuccess=()=>resolve(req.result||[]);
    req.onerror=()=>reject(req.error);
  }));
}
// 小説1件を保存（novelId をキーとして）
function libDbPut(novel){
  return openDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_LIBRARY_STORE,'readwrite');
    tx.objectStore(DB_LIBRARY_STORE).put(novel, novel.id);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  }));
}
// 小説1件を削除
function libDbDelete(novelId){
  return openDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_LIBRARY_STORE,'readwrite');
    tx.objectStore(DB_LIBRARY_STORE).delete(novelId);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  }));
}

/* ── 画像ストア操作 ── */

/* ══════════════════════════════════════
   エピソード・目次
══════════════════════════════════════ */
async function loadLibrary(){
  // まず libraryData の既存データを確認（移行済みかどうかの判定に使う）
  let existingNovels=[];
  try{ existingNovels=await libDbGetAll(); }catch(e){}
  const existingIds=new Set(existingNovels.map(n=>n.id));
  // libraryData が空の場合のみ旧データからの移行を試みる（毎起動の上書きを防ぐ）
  if(existingNovels.length===0){
    // 旧データ（単一小説）をライブラリに移行（localStorage）
    try{
      const oldRaw=localStorage.getItem(STORAGE_KEY);
      if(oldRaw){
        const obj=JSON.parse(oldRaw);
        if(obj&&obj.episodes){
          obj.id = obj.id || ('novel_migrated_ls');
          obj.updatedAt = obj.updatedAt || new Date().toISOString();
          await libDbPut(obj);
          existingIds.add(obj.id);
          localStorage.removeItem(STORAGE_KEY);
        }
      }
    }catch(e){}
    // 旧IndexedDB(novelData/current)からも移行（libraryDataが空の場合のみ）
    try{
      const obj=await dbGet();
      if(obj&&obj.episodes){
        if(!obj.id) obj.id='novel_migrated_idb';
        obj.updatedAt = obj.updatedAt || new Date().toISOString();
        if(!existingIds.has(obj.id)){
          await libDbPut(obj);
          existingIds.add(obj.id);
        }
      }
    }catch(e){ console.warn('migration from novelData failed',e); }
  }
  // ライブラリを読み込む
  try{
    const novels=await libDbGetAll();
    state.library=novels.sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
  }catch(e){
    console.warn('loadLibrary failed',e);
    state.library=[];
  }
  // ライブラリが空なら1件作成
  if(state.library.length===0){
    const novel=makeNovel('無題の小説');
    novel.episodes=[makeEpisode(1,'第1話',getDefaultPages())];
    await libDbPut(novel);
    state.library=[novel];
  }
}

function makeNovel(title){
  return{
    id:'novel_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),

    cover:'',
    episodes:[],
    lastReadId:null,
    sortMode:'newest',
    updatedAt:new Date().toISOString(),
    bg:{
      overlayColor:'white',
      overlayOpacity:75,
      posX:50,
      posY:50,
      fileName:'',
    },
  };
}

// 編集中の state.pages を state.novel の該当エピソードに書き戻す
function syncCurrentEpisode(){
  if(!state.currentEpisodeId)return;
  const ep=state.novel.episodes.find(e=>e.id===state.currentEpisodeId);
  if(!ep)return;
  ep.pages=JSON.parse(JSON.stringify(state.pages));
  ep.charCount=countChars(state.pages);
}

// ── 設定の永続化 ─────────────────────────
// localStorageから設定を読み込んで state.settings にマージ
function loadSettings(){
  try{
    const raw=localStorage.getItem(SETTINGS_KEY);
    if(!raw)return;
    const obj=JSON.parse(raw);
    if(!obj||typeof obj!=='object')return;
    // bgは小説ごとに管理するため読み飛ばす
    if(obj.bg) delete obj.bg;
    Object.assign(state.settings, obj);
  }catch(e){console.warn('loadSettings failed',e);}
}
function saveSettings(){
  try{
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
  }catch(e){console.warn('saveSettings failed',e);}
}
let _settingsTimer=null;

}

// 読み込んだ設定値をUIに反映する（init時に1回呼ぶ）
function applyLoadedSettings(){
  const s=state.settings;
  // テーマ
  applyTheme(s.themeIdx||0);
  // フォントサイズスライダー
  if($.global_size){
    $.global_size.value=s.fontSize;
    $.global_size_val.textContent=s.fontSize+'px';
  }
  // フォントボタンのactive状態（ロード済みフォントには未対応：FONTS配列のインデックスのみ）
  const fontIdx=FONTS.findIndex(f=>f.family===s.fontFamily);
  if(fontIdx>=0){
    document.querySelectorAll('.font-btn').forEach((b,i)=>{
      b.classList.toggle('active',i===fontIdx);
    });
  }
  // 編集バーのカラーボタン
  updateEbColorBtn(s.lastColor);
  // 背景設定はnovel固有のため openNovel / loadNovelBgImage で適用される
  // Enterモードラベル
  if($.eb_enter_mode && $.eb_enter_label){
    if(s.enterInsertsBr){
      $.eb_enter_mode.style.color='var(--accent)';
      $.eb_enter_label.style.color='var(--accent)';
      $.eb_enter_label.textContent='改行';
    }
  }
}

// 即時保存
function save(){
  // 編集中のページDOMを state.pages に反映してから保存
  if(state.editMode) syncEditorToState(state.curPage);
  syncCurrentEpisode();
  state.novel.updatedAt=new Date().toISOString();
  // ライブラリの該当小説を更新
  const idx=state.library.findIndex(n=>n.id===state.currentNovelId);
  if(idx>=0) state.library[idx]=JSON.parse(JSON.stringify(state.novel));
  libDbPut(state.novel).catch(e=>{
    console.warn('save failed:',e);
    showToast('保存に失敗しました');
  });
}

// 連続呼び出し用デバウンス保存（入力中など）
let _saveTimer=null;
function debouncedSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>save(),300);
}

async function resetAllData(){
  if(!confirm('この小説のデータをリセットしますか？\nエピソード・タイトル・カバー画像がすべて削除されます。'))return;
  try{
    if(state.currentNovelId){
      await libDbDelete(state.currentNovelId);
      state.library=state.library.filter(n=>n.id!==state.currentNovelId);
    }
    showLibrary();
  }catch(e){
    showToast('リセットに失敗しました');
  }
}
// ── エピソードデータ ──
function makeEpisode(num,title,initialPages){
  return{
    id:'ep_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    number:num,
    title:title||`第${num}話`,
    date:new Date().toISOString(),
    pages:initialPages||[{paras:[]}],
    charCount:0,
  };
}
function getDefaultPages(){
  return[{paras:[
    {type:'text',text:'',html:'<br>',align:'left',size:15,color:'#1a1208'},
  ]}];
}
function countChars(pgs){
  let n=0;
  pgs.forEach(p=>p.paras.forEach(pa=>{
    if(pa.type==='text')n+=(pa.text||(pa.html||'').replace(/<[^>]+>/g,'')).length;
  }));
  return n;
}

══════════════════════════════════════ */
let _resumeEpId = null;
let _resumeNovelId = null;

function showResumePopup(ep, novelTitle){
  _resumeEpId = ep.id;
  const popup = document.getElementById('resume-popup');
  const novelEl = document.getElementById('resume-popup-novel');
  const titleEl = document.getElementById('resume-popup-title');
  if(!popup || !titleEl) return;
  if(novelEl) novelEl.textContent = novelTitle || '';
  titleEl.textContent = ep.title || `第${ep.number}話`;
  // 少し遅らせて描画後に表示
  setTimeout(()=> popup.classList.add('show'), 200);
}

function dismissResumePopup(){
  const popup = document.getElementById('resume-popup');
  if(popup) popup.classList.remove('show');
  _resumeEpId = null;
  // いいえ → そのまま目次を開く
  if(_resumeNovelId){
    const nid = _resumeNovelId;
    _resumeNovelId = null;
    openNovel(nid);
  }
}

async function resumeLastEpisode(){
  const epId = _resumeEpId;
  const novelId = _resumeNovelId;
  const popup = document.getElementById('resume-popup');
  if(popup) popup.classList.remove('show');
  _resumeEpId = null;
  _resumeNovelId = null;
  if(novelId && epId){
    // 小説を開いてから該当エピソードへ
    await openNovel(novelId);
    setTimeout(()=>openEpisode(epId), 80);
  } else if(epId){
    openEpisode(epId);
  }
}

function showLibrary(){
  // 編集中なら保存
  if(state.editMode) exitEditMode();
  clearTimeout(_saveTimer);
  if(state.currentNovelId) save();
  state.currentEpisodeId=null;
  state.currentNovelId=null;
  // ライブラリ画面では背景をリセット
  resetBgDisplay();
  // 他の画面・オーバーレイを確実に閉じる（クリックブロックを防ぐ）
  closePanel();
  closeModal();
  dismissResumePopup();
  document.body.classList.add('library-mode');
  document.body.classList.remove('toc-mode');
  document.getElementById('library-screen').classList.add('show');
  $.toc_screen.classList.remove('show');
  document.getElementById('library-fab').style.display='flex';
  renderLibrary();
}

function hideLibrary(){
  if(_selectionMode) exitSelectionMode();
  document.body.classList.remove('library-mode');
  document.getElementById('library-screen').classList.remove('show');
  document.getElementById('library-fab').style.display='none';
}

function renderLibrary(){
  const grid=document.getElementById('library-grid');
  grid.innerHTML='';
  // 更新日時でソート
  const novels=[...state.library].sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
  novels.forEach(novel=>{
    const card=document.createElement('div');
    card.className='lib-card';
    const epCount=novel.episodes?novel.episodes.length:0;
    const coverStyle=novel.cover?`background-image:url('${novel.cover}');`:'';
    card.innerHTML=`
      <div class="lib-card-cover" style="${coverStyle}">
        ${!novel.cover?`<div class="lib-card-cover-placeholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>カバーなし</span>
        </div>`:''}
        <div class="lib-card-checkbox"></div>
        <div class="lib-card-ep-badge">全${epCount}話</div>

      </div>
      <div class="lib-card-title">${escapeHtml(novel.title||'無題の小説')}</div>
    `;
    card.dataset.novelId = novel.id;
    if(_selectedNovelIds.has(novel.id)) card.classList.add('selected');

    card.onclick=(e)=>{
      // 選択モード中はトグル
      if(_selectionMode){
        toggleNovelSelection(novel.id, card);
        return;
      }
      const lastEp=novel.lastReadId&&novel.episodes&&novel.episodes.find(e=>e.id===novel.lastReadId);
      if(lastEp){
        // ライブラリ上でポップアップ表示（openNovelははいボタンで実行）
        _resumeNovelId = novel.id;
        showResumePopup(lastEp, novel.title||'無題の小説');
      } else {
        openNovel(novel.id);
      }
    };
    // 長押しで選択モードへ
    let pressTimer=null;
    card.addEventListener('touchstart',()=>{
      pressTimer=setTimeout(()=>{
        if(!_selectionMode) enterSelectionMode();
        toggleNovelSelection(novel.id, card);
      },500);
    },{passive:true});
    card.addEventListener('touchend',()=>clearTimeout(pressTimer));
    card.addEventListener('touchmove',()=>clearTimeout(pressTimer));
    card.addEventListener('contextmenu',e=>{
      e.preventDefault();
      if(!_selectionMode) enterSelectionMode();
      toggleNovelSelection(novel.id, card);
    });
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════
   ライブラリ選択モード
══════════════════════════════════════ */
let _selectionMode = false;
let _selectedNovelIds = new Set();

function enterSelectionMode(){
  _selectionMode = true;
  _selectedNovelIds.clear();
  document.getElementById('library-screen').classList.add('selection-mode');
  updateSelectionCount();
}

function exitSelectionMode(){
  _selectionMode = false;
  _selectedNovelIds.clear();
  document.getElementById('library-screen').classList.remove('selection-mode');
  document.querySelectorAll('.lib-card.selected').forEach(c=>c.classList.remove('selected'));
}

function toggleNovelSelection(novelId, cardEl){
  if(_selectedNovelIds.has(novelId)){
    _selectedNovelIds.delete(novelId);
    cardEl.classList.remove('selected');
  } else {
    _selectedNovelIds.add(novelId);
    cardEl.classList.add('selected');
  }
  updateSelectionCount();
  // 選択0になったら自動で選択モード解除
  if(_selectedNovelIds.size === 0) exitSelectionMode();
}

function updateSelectionCount(){
  const n = _selectedNovelIds.size;
  const countEl = document.getElementById('lib-sel-count');
  if(countEl) countEl.textContent = `${n}冊選択`;
  const delBtn = document.getElementById('lib-sel-delete');
  if(delBtn) delBtn.disabled = (n === 0);
}

async function deleteSelectedNovels(){
  if(_selectedNovelIds.size === 0) return;
  const n = _selectedNovelIds.size;
  if(!confirm(`選択した${n}冊を削除しますか？\nこの操作は元に戻せません。`)) return;
  const ids = Array.from(_selectedNovelIds);
  for(const id of ids){
    await libDbDelete(id).catch(()=>{});
    state.library = state.library.filter(n=>n.id!==id);
  }
  // 全削除されたら新規本を作る
  if(state.library.length === 0){
    const novel = makeNovel('無題の小説');
    novel.episodes = [makeEpisode(1,'第1話',getDefaultPages())];
    await libDbPut(novel);
    state.library = [novel];
  }
  exitSelectionMode();
  renderLibrary();
  showToast(`${n}冊を削除しました`);
}

async function openNovel(novelId){
  const novel=state.library.find(n=>n.id===novelId);
  if(!novel)return;
  // 先に現在の小説を保存してからIDを切り替える
  clearTimeout(_saveTimer);
  if(state.currentNovelId && state.currentNovelId!==novelId){
    syncCurrentEpisode();
    state.novel.updatedAt=new Date().toISOString();
    const idx=state.library.findIndex(n=>n.id===state.currentNovelId);
    if(idx>=0) state.library[idx]=JSON.parse(JSON.stringify(state.novel));
    await libDbPut(state.novel).catch(e=>console.warn('save before switch failed:',e));
  }
  // 新しい小説をロード
  state.currentNovelId=novelId;
  state.novel = JSON.parse(JSON.stringify(novel));
  state.currentEpisodeId=null;
  hideLibrary();
  showToc();
  // この本の背景画像を復元
  loadNovelBgImage(novelId);
}

async function createNewNovel(){
  const novel=makeNovel('無題の小説');
  novel.episodes=[makeEpisode(1,'第1話',getDefaultPages())];
  await libDbPut(novel);
  state.library.push(novel);
  await openNovel(novel.id);
}

function openNovelMenu(novelId){
  const novel=state.library.find(n=>n.id===novelId);
  if(!novel)return;
  if(!confirm(`「${novel.title||'無題の小説'}」を削除しますか？\nこの操作は元に戻せません。`))return;
  deleteNovel(novelId);
}

async function deleteNovel(novelId){
  await libDbDelete(novelId);
  state.library=state.library.filter(n=>n.id!==novelId);
  if(state.library.length===0){
    const novel=makeNovel('無題の小説');
    novel.episodes=[makeEpisode(1,'第1話',getDefaultPages())];
    await libDbPut(novel);

// ── 目次画面 ──
function showToc(){

  clearTimeout(_saveTimer);
  if(state.currentNovelId && state.currentEpisodeId) save();

  document.body.classList.remove('library-mode');
  $.toc_screen.classList.add('show');
  document.getElementById('library-screen').classList.remove('show');
  document.getElementById('library-fab').style.display='none';
  renderToc();
}

function hideToc(){
  document.body.classList.remove('toc-mode');
  $.toc_screen.classList.remove('show');
}

function renderToc(){
  // タイトル・作者
  const titleEl=$.toc_novel_title;
  const authorEl=$.toc_novel_author;
  if(document.activeElement!==titleEl)titleEl.textContent=state.novel.title==='無題の小説'?'':state.novel.title;
  if(document.activeElement!==authorEl)authorEl.textContent=state.novel.author||'';
  // カバー
  const cover=$.toc_cover;
  const placeholder=$.toc_cover_placeholder;
  if(state.novel.cover){
    cover.style.backgroundImage=`url('${state.novel.cover}')`;
    cover.classList.add('has-image');
    placeholder.style.display='none';
  }else{
    cover.style.backgroundImage='none';
    cover.classList.remove('has-image');
    placeholder.style.display='';
  }
  // 統計
  const totalChars=state.novel.episodes.reduce((s,e)=>s+(e.charCount||0),0);
  $.ts_ep_count.textContent=state.novel.episodes.length;
  $.ts_char_count.textContent=totalChars.toLocaleString();
  // エピソード一覧
  const list=$.toc_list;
  list.innerHTML='';
  if(state.novel.episodes.length===0){
    list.innerHTML='<div class="toc-empty">エピソードがありません<br>右下の ＋ ボタンから追加できます</div>';
    return;
  }
  // ソート
  let eps=[...state.novel.episodes];
  if(state.novel.sortMode==='newest'){
    eps.sort((a,b)=>b.number-a.number);
  }else{
    eps.sort((a,b)=>a.number-b.number);
  }
  eps.forEach(ep=>{
    const div=document.createElement('div');
    div.className='toc-ep'+(ep.id===state.novel.lastReadId?' last-read':'');
    const dateStr=formatDate(ep.date);
    div.innerHTML=`
      <span class="toc-ep-num">${ep.number.toString().padStart(3,'0')}</span>
      <div class="toc-ep-title">${escapeHtml(ep.title)}</div>
      <div class="toc-ep-meta">
        <span>${dateStr}</span>
        <span>${(ep.charCount||0).toLocaleString()} 文字</span>
      </div>
    `;
    div.onclick=(e)=>{
      // 番号バッジ長押しでメニュー(将来用)
      openEpisode(ep.id);
    };
    // 長押しで編集メニュー
    let pressTimer=null;
    div.addEventListener('touchstart',()=>{
      pressTimer=setTimeout(()=>openEpMenu(ep.id),550);
    },{passive:true});
    div.addEventListener('touchend',()=>clearTimeout(pressTimer));
    div.addEventListener('touchmove',()=>clearTimeout(pressTimer));
    div.addEventListener('contextmenu',e=>{e.preventDefault();openEpMenu(ep.id);});
    list.appendChild(div);
  });

  // しおり付きエピソードが画面に表示されるようスクロール
  const lastReadEl = list.querySelector('.toc-ep.last-read');
  if(lastReadEl){
    // DOMが確定してからスクロール
    requestAnimationFrame(()=>{
      const listRect = list.getBoundingClientRect();
      const elRect = lastReadEl.getBoundingClientRect();
      // リストの表示範囲内に収まっているかチェック
      const isVisible = elRect.top >= listRect.top && elRect.bottom <= listRect.bottom;
      if(!isVisible){
        lastReadEl.scrollIntoView({block:'center', behavior:'instant'});
      }
    });
  }
}

function formatDate(iso){
  if(!iso)return '';
  const d=new Date(iso);
  const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  const yest=new Date(now);yest.setDate(now.getDate()-1);
  const isYest=d.toDateString()===yest.toDateString();
  if(sameDay)return '今日 '+d.toTimeString().slice(0,5);
  if(isYest)return '昨日 '+d.toTimeString().slice(0,5);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function escapeHtml(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function setSort(mode){
  state.novel.sortMode=mode;
  $.sort_newest.classList.toggle('active',mode==='newest');
  $.sort_oldest.classList.toggle('active',mode==='oldest');

  // タイトル変更は即時保存（debounce中にリロード/画面遷移すると消えるため）
  clearTimeout(_saveTimer);

function setCoverImage(input){
  const file=input.files[0];
  if(!file)return;
  // 画像を圧縮してdataURL化（最大幅400px、JPEG 0.8）
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=400;
      const scale=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*scale);
      const h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      state.novel.cover=canvas.toDataURL('image/jpeg',0.8);
      // ライブラリにも反映
      const idx=state.library.findIndex(n=>n.id===state.currentNovelId);
      if(idx>=0) state.library[idx].cover=state.novel.cover;
      debouncedSave();
      renderToc();
    };
    img.onerror=()=>{
      // 画像化失敗時はそのまま使う
      state.novel.cover=e.target.result;
      debouncedSave();
      renderToc();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ══════════════════════════════════════
   エクスポート
══════════════════════════════════════ */
async function exportAsZip(){
  if(!state.novel.episodes||state.novel.episodes.length===0){
    showToast('エクスポートするエピソードがありません');
    return;
  }

  // JSZip をCDNから動的ロード（初回のみ）
  if(!window.JSZip){
    try{
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload=resolve;s.onerror=()=>reject(new Error('JSZip load failed'));
        document.head.appendChild(s);
      });
    }catch(e){
      showToast('ZIPライブラリの読み込みに失敗しました');
      return;
    }
  }

  const zip=new JSZip();
  const novelTitle=(state.novel.title||'無題の小説').replace(/[\\/:*?"<>|]/g,'_');
  const folder=zip.folder(novelTitle);

  // 現在開いているエピソードのデータを書き戻しておく
  syncCurrentEpisode();

  // 番号順にソート
  const sorted=[...state.novel.episodes].sort((a,b)=>a.number-b.number);

  sorted.forEach(ep=>{
    const numStr=String(ep.number).padStart(3,'0');
    const epTitle=(ep.title||'無題').replace(/[\\/:*?"<>|]/g,'_');
    const filename=`${numStr}_${epTitle}.txt`;

    // state.pages → プレーンテキスト
    const lines=[];
    (ep.pages||[]).forEach(pg=>{
      (pg.paras||[]).forEach(para=>{
        if(para.type==='text'){
          // HTMLタグを除去してテキストだけ取り出す
          const raw=(para.html!==undefined)?para.html.replace(/<[^>]+>/g,''):(para.text||'');
          lines.push(raw);
        }
      });
    });
    folder.file(filename, lines.join('\n'), {binary:false});
  });

  try{
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/zip'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${novelTitle}.zip`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},2000);
    showToast(`${sorted.length} 話をエクスポートしました`);
  }catch(e){
    showToast('ZIPの生成に失敗しました');
    console.error('[export]',e);
  }
}

let tocSearchDebounce=null;

function openTocSearch(){
  $.toc_search_overlay.classList.add('show');

  input.value='';

  $.toc_search_input.focus();
}

function onTocSearchInput(){
  const q=$.toc_search_input.value.trim();
  $.toc_search_clear.style.display=q?'':'none';
  // デバウンス
  clearTimeout(tocSearchDebounce);
  tocSearchDebounce=setTimeout(()=>doTocSearch(q),120);
}

function doTocSearch(q){
  const status=$.toc_search_status;
  const results=$.toc_search_results;
  if(!q){
    status.classList.remove('show');
    results.innerHTML='<div class="toc-sr-empty">タイトルや本文の<br>キーワードを入力してください</div>';
    return;
  }

  // 開いているエピソードがあれば最新内容を検索対象に反映
  syncCurrentEpisode();

  const qLower=q.toLowerCase();
  const titleHits=[];
  const bodyHits=[];

  state.novel.episodes.forEach(ep=>{
    // タイトル一致
    const titleMatch=(ep.title||'').toLowerCase().includes(qLower);
    // 本文集計
    const bodyMatches=findInPages(ep.pages||[],q);
    if(titleMatch){
      titleHits.push({ep,bodyMatchCount:bodyMatches.count,snippet:bodyMatches.snippet});
    }
    if(bodyMatches.count>0&&!titleMatch){
      bodyHits.push({ep,bodyMatchCount:bodyMatches.count,snippet:bodyMatches.snippet});
    }
  });

  // 数を表示
  const total=titleHits.length+bodyHits.length;
  const totalMatches=[...titleHits,...bodyHits].reduce((s,h)=>s+h.bodyMatchCount,0);
  status.textContent=`${total} エピソードがヒット（本文中 ${totalMatches} 件）`;
  status.classList.add('show');

  if(total===0){
    results.innerHTML='<div class="toc-sr-empty">該当するエピソードが見つかりません</div>';
    return;
  }

  // 番号順（小さい→大きい）でソート
  titleHits.sort((a,b)=>a.ep.number-b.ep.number);
  bodyHits.sort((a,b)=>a.ep.number-b.ep.number);

  let html='';
  if(titleHits.length>0){
    html+='<div class="toc-sr-section">タイトル一致</div>';
    titleHits.forEach(h=>html+=renderSrItem(h,q,true));
  }
  if(bodyHits.length>0){
    html+='<div class="toc-sr-section">本文一致</div>';
    bodyHits.forEach(h=>html+=renderSrItem(h,q,false));
  }
  results.innerHTML=html;

  // クリックで該当エピソードを開く
  results.querySelectorAll('.toc-sr-item').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.epId;
      closeTocSearch();
      openEpisode(id);
      // 開いた後、本文側の検索も連動させる
      setTimeout(()=>{
        openSearch();
        const si=$.search_input;
        if(si){si.value=q;onSrchInput();}
      },300);
    };
  });
}

function findInPages(pgs,q){
  if(!q)return{count:0,snippet:''};
  const re=new RegExp(escRe(q),'gi');
  let count=0;
  let snippet='';
  for(const pg of pgs){
    for(const para of(pg.paras||[])){
      if(para.type!=='text')continue;
      const text=para.text||(para.html||'').replace(/<[^>]+>/g,'');
      if(!text)continue;
      const matches=text.match(re);
      if(matches){
        count+=matches.length;
        if(!snippet){
          // 最初のヒットの周辺を抜粋
          const idx=text.toLowerCase().indexOf(q.toLowerCase());
          const start=Math.max(0,idx-20);
          const end=Math.min(text.length,idx+q.length+40);
          let frag=text.substring(start,end);
          if(start>0)frag='…'+frag;
          if(end<text.length)frag=frag+'…';
          // ハイライト挿入（escapeしてからmark）
          const escaped=escapeHtml(frag);
          snippet=escaped.replace(new RegExp(escRe(q),'gi'),m=>`<mark>${escapeHtml(m)}</mark>`);
        }
      }
    }
  }
  return{count,snippet};
}

function renderSrItem(hit,q,isTitleHit){
  const ep=hit.ep;
  // タイトル一致時はタイトルもハイライト
  let titleHtml=escapeHtml(ep.title);
  if(isTitleHit){
    titleHtml=titleHtml.replace(new RegExp(escRe(q),'gi'),m=>`<mark style="background:#ffe082;color:#222;padding:0 2px;border-radius:2px;">${escapeHtml(m)}</mark>`);
  }
  const numStr=ep.number.toString().padStart(3,'0');
  const countLabel=hit.bodyMatchCount>0?`本文 ${hit.bodyMatchCount} 件`:'';
  return `
    <div class="toc-sr-item" data-ep-id="${ep.id}">
      <div class="toc-sr-head">
        <span class="toc-sr-num">${numStr}</span>
        <span class="toc-sr-title">${titleHtml}</span>
        ${countLabel?`<span class="toc-sr-count">${countLabel}</span>`:''}
      </div>
      ${hit.snippet?`<div class="toc-sr-snippet">${hit.snippet}</div>`:''}
    </div>`;
}

/* ══════════════════════════════════════
   ページ描画
══════════════════════════════════════ */
function renderAllPages(){
  const vp=$.viewport;
  vp.innerHTML='';
  state.pages.forEach((pg,pi)=>{
    const el=createPageEl(pi,pg);
    vp.appendChild(el);
    el.className='page'+(pi===state.curPage?' cur':' hidden');
  });
  updatePageIndicator();
  // re-run search
  if(state.ui.search.open){
    const q=$.search_input.value.trim();
    if(q){state.ui.search.matches=[];doSearch(q);fixMatchOrder();updateSrchCount();
      if(state.ui.search.matches.length>0){state.ui.search.idx=Math.min(state.ui.search.idx,state.ui.search.matches.length-1);jumpToMatch(state.ui.search.idx);}
    }
  }
}

function createPageEl(pi,pg){
  const pageEl=document.createElement('div');
  pageEl.className='page';
  pageEl.id=`page-${pi}`;

  // top hint (previous page)
  const hintTop=document.createElement('div');
  hintTop.className='page-hint top';
  hintTop.textContent='← スワイプで前のページ';
  pageEl.appendChild(hintTop);

  // bottom hint (next page)
  const hintBot=document.createElement('div');
  hintBot.className='page-hint bot';
  hintBot.textContent='→ スワイプで次のページ';
  pageEl.appendChild(hintBot);

  const inner=document.createElement('div');
  inner.className='page-inner';

  const lbl=document.createElement('div');
  lbl.className='pnl';
  inner.appendChild(lbl);

  // ── BUILD SUB-PAGE GROUPS ──
  // Groups are delimited by {type:'group-break'} entries in paras[].
  const paras = pg.paras;

  // Split paras into groups by group-break markers
  const groupSlices = [];
  let _curItems=[],_curQis=[];
  for(let qi=0;qi<paras.length;qi++){
    if(paras[qi].type==='group-break'){
      groupSlices.push({items:_curItems,qiList:_curQis});
      _curItems=[];_curQis=[];
    } else {
      _curItems.push(paras[qi]);_curQis.push(qi);
    }
  }
  groupSlices.push({items:_curItems,qiList:_curQis});
  const groupCount = groupSlices.length;

  // Stored sub-page index for this page (default 0)
  const activeSP = (pi === state.curPage) ? Math.min(state.subPageIndex, groupCount-1) : 0;

  for(let g=0;g<groupCount;g++){
    const group=document.createElement('div');
    group.className='subpage-group'+(g===activeSP?' active':'');
    group.dataset.group=g;

    const editor=document.createElement('div');
    editor.className='page-editor';
    if(g===0) editor.id=`editor-${pi}`;
    else       editor.id=`editor-${pi}-g${g}`;
    editor.contentEditable=state.editMode?'true':'false';
    editor.spellcheck=false;

    const slice=groupSlices[g];
    for(let k=0;k<slice.qiList.length;k++){
      editor.appendChild(buildParaEl(pi,slice.qiList[k],paras[slice.qiList[k]]));
    }
    setupEditorEvents(editor,pi,g,slice.qiList[0]||0);
    group.appendChild(editor);
    inner.appendChild(group);
  }

  pageEl.appendChild(inner);
  setupScrollPageTurn(pageEl,pi,groupCount);
  return pageEl;
}

// Build a single paragraph element (<p> for text, div for image)
function buildParaEl(pi,qi,para){
  if(para.type==='image'){
    const wrap=document.createElement('div');
    wrap.className='para-img-wrap';
    wrap.dataset.pi=pi; wrap.dataset.qi=qi; wrap.dataset.type='image';
    if(para.imgName) wrap.dataset.imgName=para.imgName;
    wrap.contentEditable='false'; // images not directly editable
    const img=document.createElement('img');
    img.className='para-image';img.alt='挿絵';
    img.style.display='block';
    img.style.maxWidth=(para.width||80)+'%';
    img.style.margin=para.align==='right'?'0 0 24px auto':
                     para.align==='left' ?'0 auto 24px 0':'0 auto 24px';
    // imgName があればDBから取得、なければsrcをそのまま使用
    if(para.imgName){
      img.src=''; // プレースホルダー
      imgDbGet(para.imgName).then(dataUrl=>{
        if(dataUrl) img.src=dataUrl;
        else img.alt=`[画像なし: ${para.imgName}]`;
      });
    } else {
      img.src=para.src||'';
    }
    wrap.appendChild(img);

    // 編集モード中のみ削除ボタン
    const delBtn=document.createElement('button');
    delBtn.className='para-img-delete';
    delBtn.textContent='×';
    delBtn.title='画像を削除';
    delBtn.contentEditable='false';
    delBtn.onclick=e=>{
      e.stopPropagation();
      e.preventDefault();
      deleteImagePara(pi, para.imgName);
    };
    wrap.appendChild(delBtn);

    // 画像タップで×ボタンを表示／他の画像のボタンは隠す
    wrap.onclick=e=>{
      if(!state.editMode) return;
      e.stopPropagation();
      const wasShown=wrap.classList.contains('show-delete');
      // 全ての画像の削除ボタンを隠す
      document.querySelectorAll('.para-img-wrap.show-delete').forEach(w=>w.classList.remove('show-delete'));
      // 自分にトグル（既に表示中なら閉じる）
      if(!wasShown) wrap.classList.add('show-delete');
    };

    return wrap;
  }else{
    const p=document.createElement('p');
    p.dataset.pi=pi; p.dataset.qi=qi; p.dataset.type='text';
    if(typeof para.html==='string' && para.html!==''){
      p.innerHTML=para.html;
    }else if(para.text){
      p.textContent=para.text;
    }else{
      // 空段落でもカーソルが立つように <br> を入れる
      p.innerHTML='<br>';
    }
    p.style.textAlign=para.align||'left';
    p.style.fontSize=(para.size||state.settings.fontSize)+'px';
    p.style.color=para.color||state.settings.color;
    p.style.fontFamily=para.fontFamily||state.settings.fontFamily;
    return p;
  }
}

// Attach keydown/input/focus listeners to the single editor div
function setupEditorEvents(editor,pi,groupIdx=0,qiOffset=0){
  // Track input → sync state & debounced save
  editor.addEventListener('input', ()=>{
    syncEditorToState(pi);
    debouncedSave();
  });

  // Focus → show edit bar for the paragraph under caret
  editor.addEventListener('focus', ()=>{
    const para=getParaUnderCaret(pi);
    if(para){
      state.ui.selPara=para;
      showEB(state.pages[pi].paras[para.qi]);
    }
  });

  // Click → show edit bar
  editor.addEventListener('click', ()=>{
    const para=getParaUnderCaret(pi);
    if(para){ state.ui.selPara=para; showEB(state.pages[pi].paras[para.qi]); }
  });

  // Keyboard handling
  editor.addEventListener('keydown', e=>{
    // Ctrl+A → select all content in this editor (current group only)
    if((e.ctrlKey||e.metaKey)&&(e.key==='a'||e.key==='A')){
      e.preventDefault();
      selectAllInEditor(pi);
      return;
    }
    // Backspace / Delete → カーソルが先頭＆グループが空なら空グループを削除
    if((e.key==='Backspace'||e.key==='Delete')&&!e.isComposing&&!e.ctrlKey&&!e.metaKey){
      if(isCurrentGroupEmpty(pi)){
        const gi = state.subPageIndex;
        const total = countGroups(pi);
        if(gi === total - 1 && total > 1){
          e.preventDefault();
          deleteEmptyGroup(pi, gi);
          return;
        }
      }
    }
    // Enter → 段落分割 or 段落内改行（モードによる）、Shift+Enter → 逆の動作
    if(e.key==='Enter'&&!e.isComposing){
      // 画像名（例: illust1.png）が単独行に書かれていたら画像に変換
      const paraEl=getParaElUnderCaret();
      if(paraEl){
        const txt=(paraEl.textContent||'').trim();
        if(/^[\w\-\.]+\.(png|jpg|jpeg|gif|webp|svg)$/i.test(txt)){
          e.preventDefault();
          const qi=parseInt(paraEl.dataset.qi,10);
          imgDbGet(txt).then(dataUrl=>{
            if(dataUrl){
              // 段落をimage型に置き換え
              state.pages[pi].paras[qi]={type:'image',imgName:txt,src:'',align:'center',width:80};
              refreshPage(pi);
              showToast(`「${txt}」を挿入しました`);
            } else {
              showToast(`「${txt}」はライブラリにありません`);
              // 通常のEnter処理を続行
              const insertBr = state.settings.enterInsertsBr ? true : false;
              if(insertBr) document.execCommand('insertLineBreak');
              else splitAtCaret(pi);
            }
          });
          return;
        }
      }
      e.preventDefault();
      // state.settings.enterInsertsBr=true のとき Enter=<br>、Shift+Enter=段落分割（逆もしかり）
      const insertBr = state.settings.enterInsertsBr ? !e.shiftKey : e.shiftKey;
      if(insertBr){
        document.execCommand('insertLineBreak');
      } else {
        splitAtCaret(pi);
      }
      return;
    }
  });

  // selectionchange → update edit bar when caret moves
  editor.addEventListener('selectionchange', ()=>{
    const para=getParaUnderCaret(pi);
    if(para){ state.ui.selPara=para; syncEB(state.pages[pi].paras[para.qi]); }
  });

  // touchend → Androidでタップ後にカーソルが確定してからselParaを更新
  editor.addEventListener('touchend', ()=>{
    setTimeout(()=>{
      const para=getParaUnderCaret(pi);
      if(para){ state.ui.selPara=para; syncEB(state.pages[pi].paras[para.qi]); }
    }, 50);
  }, {passive:true});
}

// Sync the editor DOM back into state.pages[] state
function syncEditorToState(pi){
  // Collect paras from ALL subpage group editors for this page
  const pageEl=document.getElementById(`page-${pi}`);
  if(!pageEl){return;}
  const groups=pageEl.querySelectorAll('.subpage-group');
  const newParas=[];
  let globalQi=0;

  groups.forEach((grp,g)=>{
    // グループ間に group-break を挿入（最初のグループは不要）
    if(g>0) newParas.push({type:'group-break'});

    const editorId = g===0 ? `editor-${pi}` : `editor-${pi}-g${g}`;
    const editor=document.getElementById(editorId)||grp.querySelector('.page-editor');
    if(!editor)return;
    let qi=0;
    editor.childNodes.forEach(node=>{
      if(node.nodeType===3){
        if(node.textContent.trim()){
          newParas.push({type:'text',text:node.textContent,html:node.textContent,
            align:'left',size:state.settings.fontSize,color:state.settings.lastColor});
        }
        return;
      }
      if(node.dataset&&node.dataset.type==='image'){
        // 画像段落は globalQi ベースのインデックスではなく、imgName で元データを探す
        // (テキストノードの空白などで globalQi がずれる可能性があるため)
        const imgName = node.dataset.imgName || '';
        let orig = null;
        if(imgName && state.pages[pi]){
          orig = state.pages[pi].paras.find(p => p.type==='image' && p.imgName===imgName);
        }
        if(orig){
          newParas.push(orig);
        } else {
          // 最後の手段：DOM情報から最低限の画像段落を作る
          const imgEl=node.querySelector('img');
          newParas.push({
            type:'image',
            imgName: imgName,
            src: imgEl?imgEl.src:'',
            align:'center',
            width: 80,
          });
        }
      }else if(node.tagName==='P'||node.tagName==='DIV'){
        const orig=state.pages[pi]&&state.pages[pi].paras[globalQi];
        newParas.push({
          type:'text',
          text:node.textContent,
          html:node.innerHTML,
          align:(node.style.textAlign||orig?.align||'left'),
          size:parseInt(node.style.fontSize)||orig?.size||state.settings.fontSize,
          color:(node.style.color||orig?.color||state.settings.color),
        });
      }
      if(node.dataset){node.dataset.pi=pi; node.dataset.qi=globalQi;}
      qi++;
      globalQi++;
    });
  });
  state.pages[pi].paras=newParas;
}

// Refresh a single page's DOM from state (preserving scroll position)
function refreshPage(pi){
  const old=document.getElementById(`page-${pi}`);
  if(!old){renderAllPages();return;}
  const wasClass=old.className;
  const scrollTop=old.scrollTop;
  const neo=createPageEl(pi,state.pages[pi]);
  neo.className=wasClass;
  old.replaceWith(neo);
  neo.scrollTop=scrollTop;
  updatePageIndicator();
}

/* ══════════════════════════════════════
   段落ヘルパー
══════════════════════════════════════ */
// Get the <p data-pi data-qi> element under current caret
function getParaElUnderCaret(){
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0)return null;
  let node=sel.anchorNode;
  if(!node)return null;
  if(node.nodeType===3)node=node.parentNode;
  while(node&&node!==document.body){
    if((node.tagName==='P'||node.tagName==='DIV')&&node.dataset&&node.dataset.qi!==undefined)return node;
    node=node.parentNode;
  }
  return null;
}

function getParaUnderCaret(pi){
  const el=getParaElUnderCaret();
  if(!el)return null;
  const ePi=parseInt(el.dataset.pi,10);
  const qi=parseInt(el.dataset.qi,10);
  if(ePi!==pi||isNaN(qi))return null;
  return {pi,qi,el};
}

// Return {pi,qi} for the currently active paragraph (any page)
function getActivePara(){
  const el=getParaElUnderCaret();
  if(el){
    const pi=parseInt(el.dataset.pi,10);
    const qi=parseInt(el.dataset.qi,10);
    if(!isNaN(pi)&&!isNaN(qi))return{pi,qi,el};
  }
  return state.ui.selPara;
}

// Get the <p> element for a given {pi,qi} — searches all sub-group editors
function getContent(pi,qi){
  const pageEl=document.getElementById(`page-${pi}`);
  if(!pageEl)return null;
  return pageEl.querySelector(`[data-qi="${qi}"]`)||null;
}

// Move caret to end of element
function moveCursorEnd(el){
  try{const r=document.createRange(),s=window.getSelection();r.selectNodeContents(el);r.collapse(false);s.removeAllRanges();s.addRange(r);}catch(e){}
}

// Select all content inside the ACTIVE sub-page group editor of page pi
function selectAllInEditor(pi){
  const pageEl=document.getElementById(`page-${pi}`);
  if(!pageEl)return;
  // Find the active sub-page group
  const activeGroup=pageEl.querySelector('.subpage-group.active');
  const editor=activeGroup
    ? activeGroup.querySelector('.page-editor')
    : document.getElementById(`editor-${pi}`);
  if(!editor)return;
  const sel=window.getSelection();
  const r=document.createRange();
  r.selectNodeContents(editor);
  sel.removeAllRanges();
  sel.addRange(r);
}

// Place caret at a text offset within an element
function placeCaretAtOffset(el,offset){
  const sel=window.getSelection();
  const range=document.createRange();
  if(!el.firstChild){range.setStart(el,0);range.collapse(true);sel.removeAllRanges();sel.addRange(range);return;}
  const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT,null);
  let remaining=offset,lastNode=null,n;
  while((n=walker.nextNode())){
    lastNode=n;
    if(n.nodeValue.length>=remaining){range.setStart(n,remaining);range.collapse(true);sel.removeAllRanges();sel.addRange(range);return;}
    remaining-=n.nodeValue.length;
  }
  if(lastNode){range.setStart(lastNode,lastNode.nodeValue.length);range.collapse(true);sel.removeAllRanges();sel.addRange(range);}
}

/* ══════════════════════════════════════
   段落の分割・結合
══════════════════════════════════════ */
function splitAtCaret(pi){
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0)return;
  const range=sel.getRangeAt(0);
  const paraEl=getParaElUnderCaret();
  if(!paraEl||parseInt(paraEl.dataset.pi,10)!==pi)return;

  const qi=parseInt(paraEl.dataset.qi,10);
  const origPara=state.pages[pi].paras[qi]||{};

  // Extract content after caret into a new <p>
  const afterRange=document.createRange();
  afterRange.setStart(range.endContainer,range.endOffset);
  afterRange.setEndAfter(paraEl.lastChild||paraEl);
  // safely clamp
  try{afterRange.setEndAfter(paraEl.lastChild||paraEl);}catch(e){afterRange.setEnd(paraEl,paraEl.childNodes.length);}

  const frag=afterRange.extractContents();
  // delete selection if non-collapsed
  if(!range.collapsed)range.deleteContents();

  const newP=document.createElement('p');
  newP.dataset.pi=pi;
  newP.dataset.qi=qi+1; // will be renumbered by syncEditorToState
  newP.dataset.type='text';
  newP.style.textAlign=paraEl.style.textAlign||'left';
  newP.style.fontSize=paraEl.style.fontSize||(state.settings.fontSize+'px');
  newP.style.color=paraEl.style.color||state.settings.color;
  newP.appendChild(frag);
  if(newP.textContent===''&&newP.children.length===0){
    // ensure non-empty so caret can land here
    newP.appendChild(document.createTextNode(''));
  }

  const editor=document.getElementById(`editor-${pi}`);
  paraEl.after(newP);
  // renumber all qi in this editor
  renumberEditor(pi);
  save();

  // Move caret to start of new paragraph
  const sel2=window.getSelection();
  const r2=document.createRange();
  if(newP.firstChild){r2.setStart(newP.firstChild,0);}else{r2.setStart(newP,0);}
  r2.collapse(true);
  sel2.removeAllRanges();
  sel2.addRange(r2);

  showEB(state.pages[pi].paras[qi+1]||state.pages[pi].paras[qi]);
}

function renumberEditor(pi){
  const pageEl=document.getElementById(`page-${pi}`);
  if(!pageEl)return;
  let qi=0;
  const groups=pageEl.querySelectorAll('.subpage-group');
  groups.forEach(grp=>{
    const editor=grp.querySelector('.page-editor');
    if(!editor)return;
    editor.childNodes.forEach(n=>{
      if(n.dataset){n.dataset.pi=pi;n.dataset.qi=qi++;}
    });
  });
}

/* ══════════════════════════════════════
   スクロール・ページ送り
══════════════════════════════════════ */
function setupScrollPageTurn(pageEl,pi,groupCount){
  const hintTop=pageEl.querySelector('.page-hint.top');
  const hintBot=pageEl.querySelector('.page-hint.bot');

  function getActiveGroupIdx(){
    const g=pageEl.querySelector('.subpage-group.active');
    return g?parseInt(g.dataset.group,10):0;
  }

  // Update hints based on current scroll and sub-page state
  function updateHints(){
    const atTop=pageEl.scrollTop<=0;
    const atBot=pageEl.scrollTop+pageEl.clientHeight>=pageEl.scrollHeight-2;
    const hasPrev=pi>0;
    const hasNext=pi<state.pages.length-1;
    const sg=getActiveGroupIdx();
    const hasNextGroup=groupCount>1&&sg<groupCount-1;
    const hasPrevGroup=sg>0;

    // page-level hints only at first/last sub-page
    if(hintTop)hintTop.classList.toggle('show',atTop&&hasPrev&&sg===0);
    if(hintBot)hintBot.classList.toggle('show',atBot&&hasNext&&!hasNextGroup);
  }

  // ── Show a specific sub-page group with animation ──
  function showSubPage(sg, animate=true){
    // 離れる前に現在グループが空なら自動削除（末尾グループのみ）
    if(pi===state.curPage && isCurrentGroupEmpty(pi)){
      const gi = state.subPageIndex;
      const total = countGroups(pi);
      if(gi === total - 1 && total > 1){
        // 末尾の空グループを削除してから移動
        deleteEmptyGroup(pi, gi);
        return;
      }
    }
    const groups=pageEl.querySelectorAll('.subpage-group');
    groups.forEach((g,i)=>{
      g.classList.remove('active','fade-in','slide-up');
      if(i===sg){
        g.classList.add('active');
        if(animate){
          void g.offsetWidth;
          g.classList.add('slide-up');
        }
      }
    });
    if(pi===state.curPage) state.subPageIndex=sg;
    pageEl.scrollTop=0;
    updateSubPageDots(pi,sg,groupCount);
    updateHints();
  }

  // Touch overscroll detection
  let touchStartY=0;
  let touchStartScrollTop=0;
  const TRIGGER=60;

  let touchStartX=0;
  let touchMoved=false;
  let subSwitchLocked=false; // 1タッチ中に1回だけブロック切替を許可するロック

  pageEl.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    touchStartY=e.touches[0].clientY;
    touchStartX=e.touches[0].clientX;
    touchStartScrollTop=pageEl.scrollTop;
    touchMoved=false;
    subSwitchLocked=false; // 新しいタッチ開始でロック解除
  },{passive:true});

  pageEl.addEventListener('touchend',e=>{
    subSwitchLocked=false; // タッチ終了でもリセット
    if(state.ui.transitioning||e.changedTouches.length!==1)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    // 横方向が明らかに優勢なスワイプ
    if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>50){
      if(dx<0){
        // 左スワイプ → 次ページ（自動追加含む）
        goPage(1,'h');
      } else if(dx>0){
        // 右スワイプ → 前ページ or 前のエピソード
        goPage(-1,'h');
      }
    }
  },{passive:true});

  pageEl.addEventListener('touchmove',e=>{
    if(state.ui.transitioning||subSwitchLocked)return;
    const dy=touchStartY-e.touches[0].clientY;
    const maxScroll=pageEl.scrollHeight-pageEl.clientHeight;
    const atTop=touchStartScrollTop<=0;
    const atBot=touchStartScrollTop>=maxScroll-2;
    const sg=getActiveGroupIdx();

    if(dy>0&&atBot){
      if(sg<groupCount-1){
        const dist=dy-(maxScroll-touchStartScrollTop);
        if(dist>TRIGGER){
          subSwitchLocked=true;
          showSubPage(sg+1,true);
        }
      } else if(state.editMode){
        const dist=dy-(maxScroll-touchStartScrollTop);
        if(dist>TRIGGER){
          subSwitchLocked=true;
          autoAddGroup(pi);
        }
      }
      // 閲覧モードで最終グループ → 何もしない（エピソード移動なし）
    } else if(dy<0&&atTop){
      if(sg>0){
        const dist=(-dy)-touchStartScrollTop;
        if(dist>TRIGGER){
          subSwitchLocked=true;
          showSubPage(sg-1,true);
        }
      }
      // sg===0 → 何もしない（前ページ・前エピソード移動なし）
    }
  },{passive:true});

  // Wheel overscroll (desktop)
  let wheelAccum=0;
  let wheelTimer=null;
  pageEl.addEventListener('wheel',e=>{
    if(state.ui.transitioning)return;
    const maxScroll=pageEl.scrollHeight-pageEl.clientHeight;
    const atTop=pageEl.scrollTop<=0;
    const atBot=pageEl.scrollTop>=maxScroll-2;
    const sg=getActiveGroupIdx();

    if(e.deltaY>0&&atBot){
      if(sg<groupCount-1){
        wheelAccum+=e.deltaY;
      } else if(state.editMode){
        wheelAccum+=e.deltaY; // 編集モードのみ（グループ追加用）
      } else {
        wheelAccum=0;
      }
    } else if(e.deltaY<0&&atTop){
      if(sg>0){
        wheelAccum+=e.deltaY;
      } else {
        wheelAccum=0;
      }
    } else {
      wheelAccum=0;
    }
    clearTimeout(wheelTimer);
    wheelTimer=setTimeout(()=>{wheelAccum=0;},400);

    if(Math.abs(wheelAccum)>120){
      const dir=wheelAccum>0?1:-1;
      wheelAccum=0;
      if(dir>0){
        if(sg<groupCount-1) showSubPage(sg+1,true);
        else if(state.editMode) autoAddGroup(pi);
      } else {
        if(sg>0) showSubPage(sg-1,true);
      }
    }
    updateHints();
  },{passive:true});

  pageEl.addEventListener('scroll',updateHints,{passive:true});
  setTimeout(updateHints,100);
}

function updateSubPageDots(pi,sg,groupCount){
  const dotsEl=$.subpage_dots;
  if(!dotsEl)return;
  // Only show dots if more than 1 group
  if(groupCount<=1){dotsEl.classList.remove('show');return;}
  dotsEl.innerHTML='';
  for(let i=0;i<groupCount;i++){
    const d=document.createElement('div');

  }
  dotsEl.classList.add('show');

/* ══════════════════════════════════════
   ページ遷移アニメーション
══════════════════════════════════════ */
// dir: 縦=±1, 横スワイプ=±1 (axis:'h'/'v')
function goPage(dir, axis='v'){
  if(state.ui.transitioning)return;
  const next=state.curPage+dir;
  if(next<0){
    // 先頭ページより前 → 前のエピソードへ
    if(dir<0) goAdjacentEpisode(-1);
    return;
  }
  // 最終ページを超えたら → 次のエピソードへ（編集・閲覧モード共通）
  if(next>=state.pages.length){
    const _sorted=[...state.novel.episodes].sort((a,b)=>a.number-b.number);
    const _idx=_sorted.findIndex(e=>e.id===state.currentEpisodeId);
    if(_idx!==-1 && _sorted[_idx+1]) openEpisode(_sorted[_idx+1].id);
    return;
  }
  slideToPage(next,dir,axis);
}

// 前後のエピソードへ移動
function goAdjacentEpisode(dir){
  if(!state.currentEpisodeId)return;
  const sorted=[...state.novel.episodes].sort((a,b)=>a.number-b.number);
  const idx=sorted.findIndex(e=>e.id===state.currentEpisodeId);
  if(idx===-1)return;
  const target=sorted[idx+dir];
  if(!target) return; // 端なら何もしない
  // 前へ戻る場合は最終ページから開く、次へ進む場合は先頭ページから
  openEpisode(target.id, dir<0 ? 'last' : 'first');
}
function goToPage(idx){
  if(idx===state.curPage||state.ui.transitioning)return;
  slideToPage(idx,idx>state.curPage?1:-1,'v');
}

function slideToPage(next,dir,axis='v'){
  state.ui.transitioning=true;
  closeColorPopup();
  const ae=document.activeElement;if(ae&&ae.isContentEditable)ae.blur();
  hideEB();
  state.ui.selPara=null;

  const curEl=document.getElementById(`page-${state.curPage}`);
  const nextEl=document.getElementById(`page-${next}`);
  if(!curEl||!nextEl){state.ui.transitioning=false;return;}

  // 縦 or 横のクラスを選択
  let inClass, outClass;
  if(axis==='h'){
    inClass  = dir>0 ? 'slide-in-right'  : 'slide-in-left';
    outClass = dir>0 ? 'slide-out-left'  : 'slide-out-right';
  } else {
    inClass  = dir>0 ? 'slide-in-below'  : 'slide-in-above';
    outClass = dir>0 ? 'slide-out-up'    : 'slide-out-down';
  }

  nextEl.className='page '+inClass;
  nextEl.style.display='';
  if(dir>0){nextEl.scrollTop=0;}
  else{nextEl.scrollTop=nextEl.scrollHeight;}

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      curEl.className='page '+outClass;
      requestAnimationFrame(()=>curEl.classList.add('go'));
      nextEl.className='page '+inClass;
      requestAnimationFrame(()=>nextEl.classList.add('go'));

      setTimeout(()=>{
        curEl.className='page hidden';
        nextEl.className='page cur';
        state.curPage=next;
        state.subPageIndex=0;
        const newGroupCount = countGroups(state.curPage);
        if(newGroupCount<=1) $.subpage_dots.classList.remove('show');
        updatePageIndicator();
        state.ui.transitioning=false;
      },440);
    });
  });
}

function updatePageIndicator(){
  // 「現在の話番号 / 総話数」を全pnlに表示
  const sorted=[...state.novel.episodes].sort((a,b)=>a.number-b.number);
  const total=sorted.length;
  const epIdx=sorted.findIndex(e=>e.id===state.currentEpisodeId);
  const epPos=epIdx===-1?1:epIdx+1;
  document.querySelectorAll('.pnl').forEach(l=>{
    l.textContent=`${epPos} / ${total}`;
  });
}

function enterEditMode(){
  if(state.editMode)return;
  state.editMode=true;
  document.querySelectorAll('.page-editor').forEach(ed=>{
    ed.contentEditable='true';
  });
  $.topbar_back_toc.style.display='none';
  $.topbar_left_spacer.style.display='none';
  $.topbar_edit_done.style.display='';
  $.viewport.classList.add('edit-mode');
  // 編集モード入ったら編集バーをデフォルト表示
  // 現在ページの最初のテキスト段落のスタイルでバーを同期（selParaは設定しない=ユーザーがタップで決める）
  const pi=state.curPage;
  const paras=state.pages[pi]?.paras||[];
  const firstPara=paras.find(p=>p.type==='text')||paras[0];

  requestAnimationFrame(()=>{

    $.viewport.style.bottom=botbarH+'px';
  });
}

function exitEditMode(){
  if(!state.editMode)return;

  state.editMode=false;
  document.querySelectorAll('.page-editor').forEach(ed=>{
    ed.contentEditable='false';
  });

  $.topbar_left_spacer.style.display='none';

  $.viewport.classList.remove('edit-mode');
  $.botbar.style.bottom='0px';

  save();

function hideEB(){

function placeEB(){

function syncEB(para){
  if(!para)return;
  const align=para.align||'left';

function ebAlign(align){
  const t=getActivePara();if(!t)return;
  const{pi,qi}=t;
  if(!state.pages[pi]||!state.pages[pi].paras[qi])return;
  state.pages[pi].paras[qi].align=align;
  state.ui.selPara={pi,qi};
  document.querySelectorAll('#eb-scroll .eb-abtn').forEach(b=>b.classList.toggle('active',b.dataset.align===align));
  const el=getContent(pi,qi);
  if(el&&state.pages[pi].paras[qi].type!=='image')el.style.textAlign=align;
  else if(el&&state.pages[pi].paras[qi].type==='image'){
    const img=el.querySelector('img');
    if(img)img.style.margin=align==='right'?'0 0 24px auto':align==='left'?'0 auto 24px 0':'0 auto 24px';
  }
}

function ebSizeDelta(d){
  let t=getActivePara();
  // selParaがなければ現在グループの最初のテキスト段落をターゲットにする
  if(!t){
    const pi=state.curPage;
    const pg=state.pages[pi];
    if(!pg)return;
    let g=0;
    for(let qi=0;qi<pg.paras.length;qi++){
      const p=pg.paras[qi];
      if(p.type==='group-break'){g++;continue;}
      if(g===state.subPageIndex&&p.type==='text'){t={pi,qi};break;}
    }
  }
  if(!t)return;
  const{pi,qi}=t;
  if(!state.pages[pi]||!state.pages[pi].paras[qi]||state.pages[pi].paras[qi].type!=='text')return;
  const p=state.pages[pi].paras[qi];
  p.size=Math.min(40,Math.max(10,(p.size||state.settings.fontSize)+d));
  state.ui.selPara={pi,qi};
  $.eb_size_val.textContent=p.size;
  const el=getContent(pi,qi);
  if(el)el.style.fontSize=p.size+'px';
}

function applyColorToPara(hex){
  state.settings.lastColor=hex;
  updateEbColorBtn(hex);
  syncEcpDots(hex);
  debouncedSaveSettings();

  // 編集バー操作でフォーカスが外れている場合は保存済みの選択範囲を復元
  if(state.ui.savedRange){
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(state.ui.savedRange);
  }

  const sel=window.getSelection();
  // If there's a non-collapsed selection → color the range
  if(sel&&sel.rangeCount>0&&!sel.getRangeAt(0).collapsed){
    const range=sel.getRangeAt(0);
    wrapRangeWithColor(range,hex);
    save();
    return;
  }

  // Otherwise color the whole paragraph
  const t=getActivePara();if(!t)return;
  const{pi,qi}=t;
  applyParaColor(pi,qi,hex);
}

function applyParaColor(pi,qi,hex){
  if(!state.pages[pi]||!state.pages[pi].paras[qi]||state.pages[pi].paras[qi].type!=='text')return;
  state.pages[pi].paras[qi].color=hex;
  state.ui.selPara={pi,qi};
  const el=getContent(pi,qi);
  if(el){
    el.style.color=hex;
    el.querySelectorAll('span[style*="color"]').forEach(span=>{
      const parent=span.parentNode;
      while(span.firstChild)parent.insertBefore(span.firstChild,span);
      parent.removeChild(span);
    });
    el.normalize();
    state.pages[pi].paras[qi].html=el.innerHTML;
  }
}

function wrapRangeWithColor(range,hex){
  const span=document.createElement('span');
  span.style.color=hex;
  try{
    const frag=range.extractContents();
    frag.querySelectorAll('span[style*="color"]').forEach(s=>{
      const p=s.parentNode;while(s.firstChild)p.insertBefore(s.firstChild,s);p.removeChild(s);
    });
    span.appendChild(frag);
    range.insertNode(span);
    const sel=window.getSelection();
    sel.removeAllRanges();
    const nr=document.createRange();nr.selectNodeContents(span);sel.addRange(nr);
  }catch(err){console.warn('wrapRangeWithColor:',err);}
}

function openColorPopup(anchorEl){

   サブページ・グループ操作
