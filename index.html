function autoAddGroup(pi){
  if(state.ui.transitioning)return;
  if(isCurrentGroupEmpty(pi)){ showToast('現在のグループが空です'); return; }

  // カーソル位置の段落の直後に group-break を挿入
  const active = getActivePara();
  let insertAt;
  if(active && active.pi===pi){
    insertAt = active.qi + 1;
  } else {
    // カーソルなし：現在グループの末尾に挿入
    const pg = state.pages[pi];
    let lastQiInGroup = -1;
    let g = 0;
    for(let qi=0;qi<pg.paras.length;qi++){
      if(pg.paras[qi].type==='group-break'){ g++; continue; }
      if(g===state.subPageIndex) lastQiInGroup=qi;
    }
    insertAt = lastQiInGroup + 1;
  }

  state.pages[pi].paras.splice(insertAt, 0, {type:'group-break'});
  // 新グループの先頭に空段落を追加（<br>を入れてカーソルが立つようにする）
  state.pages[pi].paras.splice(insertAt+1, 0, {
    type:'text', text:'', html:'<br>', align:'left',
    size:state.settings.fontSize, color:state.settings.lastColor
  });

  // 挿入後のグループ番号を計算
  let newGroup=0;
  for(let qi=0;qi<=insertAt;qi++){
    if(state.pages[pi].paras[qi].type==='group-break') newGroup++;
  }
  state.subPageIndex = newGroup;
  refreshPage(pi);

  setTimeout(()=>{
    const pageEl=document.getElementById(`page-${pi}`);
    if(pageEl){
      const groups=pageEl.querySelectorAll('.subpage-group');
      groups.forEach((g,i)=>{
        g.classList.remove('active','fade-in','slide-up');
        if(i===newGroup){ g.classList.add('active'); void g.offsetWidth; g.classList.add('slide-up'); }
      });
      updateSubPageDots(pi, newGroup, groups.length);
    }
    if(state.editMode){
      // 新グループ先頭の段落にフォーカス
      const newQi = insertAt+1;
      const el=getContent(pi, newQi);
      if(el){ el.focus(); moveCursorEnd(el); }
    }
    // ← 新グループ作成直後のバナー表示は行わない
  }, 60);
}

function isCurrentGroupEmpty(pi){
  return isGroupEmpty(pi, state.subPageIndex);
}

function isGroupEmpty(pi, g){
  const pg = state.pages[pi];
  if(!pg)return false;
  const paras = getGroupParas(pi, g);
  if(paras.length === 0) return true;
  // 画像段落があれば空ではない
  if(paras.some(p => p.type==='image')) return false;
  // テキスト段落がすべて空なら空
  return paras.every(p =>
    p.type==='text' && (p.text||'').trim()==='' && (p.html||'').replace(/<[^>]*>/g,'').trim()===''
  );
}

// グループgのparasを返す
function getGroupParas(pi, g){
  const pg = state.pages[pi];
  if(!pg)return [];
  let cur=0;const result=[];
  for(let qi=0;qi<pg.paras.length;qi++){
    if(pg.paras[qi].type==='group-break'){cur++;continue;}
    if(cur===g) result.push(pg.paras[qi]);
    else if(cur>g) break;
  }
  return result;
}

function deleteEmptyGroup(pi, gi){
  if(pi == null || gi == null || pi < 0)return;
  const pg = state.pages[pi];
  if(!pg)return;

  const totalGroups = countGroups(pi);

  // ── 末尾グループのみ削除可能 ──
  if(gi !== totalGroups - 1){
    showToast('末尾の空グループのみ削除できます');
    return;
  }

  // グループが1つしかない → ページごと削除
  if(totalGroups <= 1){
    if(state.pages.length <= 1){
      showToast('最後のページは削除できません');
      return;
    }
    state.pages.splice(pi, 1);
    state.curPage = Math.min(pi, state.pages.length - 1);
    state.subPageIndex = 0;
    renderAllPages();
    debouncedSave();
    showToast('空のページを削除しました');
    return;
  }

  // 末尾グループの直前にある group-break を含めて、末尾グループの全paras を削除
  // paras の末尾から走査して最後の group-break を見つける
  let lastBreakIdx = -1;
  for(let qi = pg.paras.length - 1; qi >= 0; qi--){
    if(pg.paras[qi].type === 'group-break'){ lastBreakIdx = qi; break; }
  }
  if(lastBreakIdx < 0){
    // group-breakが見つからない（=グループが1つのはず）
    showToast('削除できるグループがありません');
    return;
  }
  // lastBreakIdx 以降（group-break本体含む）をすべて削除
  pg.paras.splice(lastBreakIdx);

  const newGroupCount = Math.max(1, countGroups(pi));
  const targetGroup   = newGroupCount - 1;
  state.subPageIndex  = targetGroup;
  refreshPage(pi);
  debouncedSave();
  showToast('空のグループを削除しました');
  setTimeout(()=>{
    const pageEl = document.getElementById(`page-${pi}`);
    if(pageEl){
      const groups = pageEl.querySelectorAll('.subpage-group');
      groups.forEach((g,i)=>{
        g.classList.remove('active','fade-in','slide-up');
        if(i === targetGroup) g.classList.add('active');
      });
      updateSubPageDots(pi, targetGroup, groups.length);
      // 前グループ末尾にフォーカス
      if(state.editMode){
        const activeGroup = pageEl.querySelector('.subpage-group.active');
        if(activeGroup){
          const editors = activeGroup.querySelectorAll('[contenteditable]');
          const lastEd = editors[editors.length - 1];
          if(lastEd){ lastEd.focus(); moveCursorEnd(lastEd); }
        }
      }
    }
  }, 60);
}

function countGroups(pi){
  const pg=state.pages[pi];if(!pg)return 1;
  return pg.paras.filter(p=>p.type==='group-break').length + 1;
}

/* ── 挿絵削除 ── */
function deleteImagePara(pi, imgName){
  if(!imgName) return;
  // 編集中DOMの変更を先にstateに確定（挿絵以外の編集が消えないように）
  if(state.editMode) syncEditorToState(pi);
  const paras = state.pages[pi].paras;
  const idx = paras.findIndex(p => p.type==='image' && p.imgName===imgName);
  if(idx < 0) return;
  paras.splice(idx, 1);
  refreshPage(pi);
  debouncedSave();
  // IndexedDBの画像本体も削除（同じ画像を他のエピソード・ページで使ってる可能性がないので即削除）
  imgDbDelete(imgName).catch(()=>{});
  showToast('画像を削除しました');
}

/* ── 挿絵挿入（ギャラリーから選んで即挿入） ── */
async function pickAndInsertImage(input){
  const file = input.files && input.files[0];
  if(!file) return;
  // ファイル名衝突を避けるためキー名にタイムスタンプを付与
  const ts = Date.now();
  const safeName = file.name.replace(/[\\/:*?"<>|]/g,'_');
  const key = `${ts}_${safeName}`;
  // dataURL化
  let dataUrl;
  try{
    dataUrl = await new Promise((res, rej)=>{
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = () => rej(new Error('読み込み失敗'));
      r.readAsDataURL(file);
    });
  }catch(e){
    showToast('画像の読み込みに失敗しました');
    input.value = '';
    return;
  }
  // IndexedDBに保存（背景画像と同じ imageStore）
  try{
    await imgDbSave(key, dataUrl);
  }catch(e){
    console.warn('image save failed', e);
    showToast('画像の保存に失敗しました');
    input.value = '';
    return;
  }
  // 編集モード中ならエディタDOMの変更内容を先にstateへ確定（後で上書きされないように）
  const pi = state.curPage;
  if(state.editMode){
    syncEditorToState(pi);
  }
  const paras = state.pages[pi].paras;
  const currentGroup = state.subPageIndex;

  // 段落のグループ番号を取得するヘルパー
  function groupOf(qi){
    let g = 0;
    for(let i=0;i<qi;i++){
      if(paras[i] && paras[i].type==='group-break') g++;
    }
    return g;
  }
  // 現在グループの末尾の qi を取得
  function endOfCurrentGroup(){
    let g = 0;
    let lastQi = -1;
    for(let qi=0;qi<paras.length;qi++){
      if(paras[qi].type==='group-break'){ g++; continue; }
      if(g===currentGroup) lastQi = qi;
      if(g>currentGroup) break;
    }
    // 末尾が見つからなければグループ自体が空 → group-break の直後
    if(lastQi === -1){
      // 該当グループの開始位置を探す
      let cg = 0;
      for(let qi=0;qi<paras.length;qi++){
        if(cg===currentGroup) return qi;
        if(paras[qi].type==='group-break') cg++;
      }
      return paras.length;
    }
    return lastQi + 1;
  }

  // 挿入位置の決定（現在表示中のグループ内に限定）：
  // 1. カーソル下の段落が現在グループ内ならその直後
  // 2. selParaが現在グループ内ならその直後
  // 3. どちらでもなければ現在グループの末尾
  let insertIdx = endOfCurrentGroup();
  const caretEl = getParaElUnderCaret();
  if(caretEl){
    const cpi = parseInt(caretEl.dataset.pi, 10);
    const cqi = parseInt(caretEl.dataset.qi, 10);
    if(cpi === pi && !isNaN(cqi) && groupOf(cqi) === currentGroup){
      insertIdx = cqi + 1;
    }
  } else if(state.ui.selPara && state.ui.selPara.pi === pi){
    const sqi = state.ui.selPara.qi;
    if(groupOf(sqi) === currentGroup){
      insertIdx = sqi + 1;
    }
  }

  paras.splice(insertIdx, 0, {
    type:'image',
    imgName: key,
    src: '',
    align: 'center',
    width: 80,
  });

  // 画像の直後にテキスト段落がなければ空段落を挿入、あればそこへカーソルを移動
  const afterImgIdx = insertIdx + 1;
  const nextPara = paras[afterImgIdx];
  const needNewPara = !nextPara || nextPara.type !== 'text';
  if(needNewPara){
    paras.splice(afterImgIdx, 0, {
      type:'text', text:'', html:'<br>',
      align:'left',
      size: state.settings.fontSize,
      color: state.settings.lastColor,
    });
  }

  refreshPage(pi);
  debouncedSave();

  // レンダリング完了後、次のテキスト段落にフォーカスを移動
  setTimeout(()=>{
    if(state.editMode){
      const el = getContent(pi, afterImgIdx);
      if(el){
        el.focus();
        placeCaretAtOffset(el, 0);
      }
    }
  }, 80);

  // 同じ画像を続けて選べるようリセット
  input.value = '';
}

/* ══════════════════════════════════════
   フォント・テーマ設定
══════════════════════════════════════ */
function applyGlobalSize(val){
  val=parseInt(val);
  const delta=val-state.settings.fontSize;
  state.settings.fontSize=val;
  $.global_size_val.textContent=val+'px';
  if(delta!==0){
    state.pages.forEach(pg=>{
      pg.paras.forEach(para=>{
        if(para.type==='text'){
          const cur=para.size||val;
          para.size=Math.min(40,Math.max(10,cur+delta));
        }
      });
    });
    // 段落個別のサイズが変わったので本文データも保存
    debouncedSave();
  }
  renderAllPages();
  debouncedSaveSettings();
}
function applyGlobalFont(family,idx){
  state.settings.fontFamily=family;
  // 段落個別のfontFamilyをクリアして全体フォントを反映
  state.pages.forEach(pg=>pg.paras.forEach(para=>{if(para.type==='text')delete para.fontFamily;}));
  renderAllPages();
  document.querySelectorAll('.font-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===idx);
  });
  debouncedSaveSettings();
}
function buildFontList(){
  const list=$.font_list;
  if(!list)return;
  FONTS.forEach((f,i)=>{
    const btn=document.createElement('button');
    btn.className='font-btn'+(i===0?' active':'');
    btn.style.fontFamily=f.family;
    btn.textContent=f.name;
    btn.onclick=()=>applyGlobalFont(f.family,i);
    list.appendChild(btn);
  });
}
function loadFontFile(input){
  const file=input.files[0];
  if(!file)return;
  const name=file.name.replace(/\.[^.]+$/,'');
  const reader=new FileReader();
  reader.onload=e=>{
    const fontFace=new FontFace(name,e.target.result);
    fontFace.load().then(loaded=>{
      document.fonts.add(loaded);
      const family=`'${name}',serif`;
      // フォントリストに追加
      FONTS.push({name:`${name}（読込済）`,family});
      const list=$.font_list;
      const idx=FONTS.length-1;
      const btn=document.createElement('button');
      btn.className='font-btn';
      btn.style.fontFamily=family;
      btn.textContent=FONTS[idx].name;
      btn.onclick=()=>applyGlobalFont(family,idx);
      list.appendChild(btn);
      // 即座に適用
      applyGlobalFont(family,idx);
      $.font_load_name.textContent=name;
    }).catch(()=>alert('フォントの読み込みに失敗しました'));
  };
  reader.readAsArrayBuffer(file);
}
function applyTheme(idx){
  const t=THEMES[idx];
  if(!t)return;
  state.settings.themeIdx=idx;
  document.documentElement.style.setProperty('--bg',t.bg);
  document.documentElement.style.setProperty('--ink',t.ink);
  document.querySelectorAll('.page').forEach(p=>p.style.background=t.bg);
  // ボタンのactive状態
  const cont=$.theme_btns;
  if(cont){
    cont.querySelectorAll('.ob').forEach((b,i)=>b.classList.toggle('active',i===idx));
  }
}

function buildThemeBtns(){
  const cont=$.theme_btns;
  THEMES.forEach((t,i)=>{
    const btn=document.createElement('button');btn.className='ob'+(i===0?' active':'');btn.textContent=t.name;
    btn.onclick=()=>{
      applyTheme(i);
      debouncedSaveSettings();
    };
    cont.appendChild(btn);
  });
}

/* ══════════════════════════════════════
   テキスト編集操作（undo/redo・コピー・貼り付け）
══════════════════════════════════════ */
function edUndo(){
  // フォーカスをアクティブなエディタに当ててからundo
  const ed=getActiveEditor();
  if(ed){ed.focus();}
  document.execCommand('undo');
}
function edRedo(){
  const ed=getActiveEditor();
  if(ed){ed.focus();}
  document.execCommand('redo');
}
function edSelectAll(){
  const ed=getActiveEditor();
  if(!ed)return;
  ed.focus();
  const range=document.createRange();
  range.selectNodeContents(ed);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function edCopy(){
  const sel=window.getSelection();
  if(!sel||sel.toString().length===0){
    showToast('テキストを選択してください');
    return;
  }
  const text=sel.toString();
  // Clipboard API（HTTPS必須）→ フォールバックで execCommand
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(
      ()=>showToast('コピーしました'),
      ()=>{document.execCommand('copy');showToast('コピーしました');}
    );
  }else{
    document.execCommand('copy');
    showToast('コピーしました');
  }
}
function edPaste(){
  const ed=getActiveEditor();
  if(!ed){showToast('編集エリアをタップしてください');return;}
  ed.focus();
  // 保存しておいたカーソル位置を復元
  if(state.ui.savedRange){
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(state.ui.savedRange);
  }
  // モダンブラウザ：Clipboard API
  if(navigator.clipboard&&navigator.clipboard.readText){
    navigator.clipboard.readText().then(text=>{
      if(!text){showToast('クリップボードが空です');return;}
      insertTextAtCursor(ed,text);
      save();
      showToast('貼り付けました');
    }).catch(()=>{
      // 権限拒否 → 手動貼り付けモーダル
      openManualPasteModal();
    });
  }else{
    openManualPasteModal();
  }
}

// カーソル位置にテキストを挿入
function insertTextAtCursor(editor,text){
  editor.focus();
  const sel=window.getSelection();
  if(!sel.rangeCount){
    // カーソルがなければ末尾に追加
    const range=document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  // execCommand が動けば使う（undo履歴に残るため）
  if(document.execCommand('insertText',false,text))return;
  // フォールバック：手動でテキストノード挿入
  const range=sel.getRangeAt(0);
  range.deleteContents();
  const lines=text.split('\n');
  lines.forEach((line,i)=>{
    if(i>0)range.insertNode(document.createElement('br'));
    if(line)range.insertNode(document.createTextNode(line));
    range.collapse(false);
  });
  sel.removeAllRanges();
  sel.addRange(range);
}

// 手動貼り付けモーダル（Clipboard APIが拒否された場合）
function openManualPasteModal(){
  const ed=getActiveEditor();
  $.modal_body.innerHTML=
    `<div style="font-size:12px;color:#666;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px;">下の枠に貼り付けてOKを押してください</div>
     <textarea class="mi" id="paste-input" autofocus style="min-height:120px;"></textarea>`;
  showModal('貼り付け',()=>{
    const text=document.getElementById('paste-input').value;
    if(!text)return;
    if(ed){
      ed.focus();
      if(state.ui.savedRange){
        const sel=window.getSelection();
        sel.removeAllRanges();
        sel.addRange(state.ui.savedRange);
      }
      insertTextAtCursor(ed,text);
      save();
      showToast('貼り付けました');
    }
  });
  setTimeout(()=>{
    const ta=document.getElementById('paste-input');
    if(ta){ta.focus();}
  },150);
}

    lbl.style.color='#555';
    lbl.textContent='段落';
    showToast('Enter = 段落分割 ／ Shift+Enter = 段落内改行');
  }
  debouncedSaveSettings();
}

// シンプルな通知トースト
function showToast(msg){
  let t=document.getElementById('app-toast');
  if(!t){
    t=document.createElement('div');
    t.id='app-toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-family:\'Noto Sans JP\',sans-serif;font-size:12px;padding:8px 18px;border-radius:20px;z-index:900;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},1600);
}
function getActiveEditor(){
  const ae=document.activeElement;
  if(ae&&ae.isContentEditable)return ae;
  // フォーカスがなければ現在ページの先頭エディタ
  return document.getElementById(`editor-${state.curPage}`)||null;

══════════════════════════════════════ */
function openSearch(){
  $.search_overlay.classList.add('open');
  state.ui.search.open=true;
  setTimeout(()=>$.search_input.focus(),200);
}
function closeSearch(){
  $.search_overlay.classList.remove('open');
  state.ui.search.open=false;clearHighlights();
  state.ui.search.matches=[];state.ui.search.idx=0;
  $.search_input.value='';
  updateSrchCount();
}
function onSrchInput(){
  const q=$.search_input.value.trim();
  clearHighlights();state.ui.search.matches=[];state.ui.search.idx=0;
  if(!q){updateSrchCount();return;}
  doSearch(q);fixMatchOrder();updateSrchCount();
  if(state.ui.search.matches.length>0){state.ui.search.idx=0;jumpToMatch(0);}
  $.srch_prev.disabled=state.ui.search.matches.length===0;
  $.srch_next.disabled=state.ui.search.matches.length===0;
}
function onSrchKey(e){
  if(e.key==='Enter'){e.preventDefault();srchNav(e.shiftKey?-1:1);}
  if(e.key==='Escape')closeSearch();
}
// グローバルキー操作
document.addEventListener('keydown',e=>{
  if(state.ui.search.open)return; // 検索中は無効
  // Ctrl+Z/Y は編集中でも有効
  if((e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='Z')){e.preventDefault();edUndo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||e.key==='Y')){e.preventDefault();edRedo();return;}
  if(document.activeElement&&document.activeElement.isContentEditable)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goPage(1,'h');
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')    goPage(-1,'h');
});
function srchNav(dir){
  if(!state.ui.search.matches.length)return;
  state.ui.search.idx=(state.ui.search.idx+dir+state.ui.search.matches.length)%state.ui.search.matches.length;
  jumpToMatch(state.ui.search.idx);updateSrchCount();
}
function updateSrchCount(){
  $.search_count.textContent=state.ui.search.matches.length?`${state.ui.search.idx+1}/${state.ui.search.matches.length}`:'0/0';
}
function doSearch(q){
  state.pages.forEach((pg,pi)=>{
    const pageEl=document.getElementById(`page-${pi}`);
    if(!pageEl)return;
    const editors=pageEl.querySelectorAll('.page-editor');
    editors.forEach(editor=>highlightInNode(editor,q,pi));
  });
}
function highlightInNode(container,q,pi){
  const walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT,null);
  const nodes=[];let n;while((n=walker.nextNode()))nodes.push(n);
  nodes.forEach(tn=>{
    const txt=tn.nodeValue;
    const re=new RegExp(escRe(q),'gi');let m;const ranges=[];
    while((m=re.exec(txt))!==null)ranges.push({start:m.index,end:m.index+m[0].length});
    if(!ranges.length)return;
    ranges.reverse().forEach(({start,end})=>{
      const after=tn.splitText(end);const match=tn.splitText(start);
      const mark=document.createElement('mark');mark.className='sh';
      mark.dataset.pi=pi;
      match.parentNode.insertBefore(mark,after);mark.appendChild(match);
      state.ui.search.matches.push({pi,mark});
    });
  });
}
function fixMatchOrder(){state.ui.search.matches.reverse();}
function clearHighlights(){
  document.querySelectorAll('mark.sh').forEach(m=>{
    const p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();
  });
}
function jumpToMatch(idx){
  document.querySelectorAll('mark.sh').forEach(m=>m.classList.remove('current'));
  if(!state.ui.search.matches.length)return;
  const{pi,mark}=state.ui.search.matches[idx];
  if(pi!==state.curPage)goToPage(pi);
  mark.classList.add('current');
  // Show the sub-page group containing this mark
  setTimeout(()=>{
    const groupEl=mark.closest('.subpage-group');
    if(groupEl){
      const pageEl=groupEl.closest('.page');
      if(pageEl){
        const sg=parseInt(groupEl.dataset.group,10);
        const groupCount=pageEl.querySelectorAll('.subpage-group').length;
        pageEl.querySelectorAll('.subpage-group').forEach((g,i)=>{
          g.classList.remove('active','slide-up','fade-in');
          if(i===sg) g.classList.add('active');
        });
        if(pi===state.curPage) state.subPageIndex=sg;
        updateSubPageDots(pi,sg,groupCount);
      }
    }
    mark.scrollIntoView({block:'center',behavior:'smooth'});
  },120);
}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

/* ══════════════════════════════════════
   バックアップ・復元
══════════════════════════════════════ */

function openBackupMenu(){
  document.getElementById('backup-menu-ov').style.display='block';
  document.getElementById('backup-menu').style.display='block';
}
function closeBackupMenu(){
  document.getElementById('backup-menu-ov').style.display='none';
  document.getElementById('backup-menu').style.display='none';
}

async function doBackup(){
  closeBackupMenu();
  showToast('バックアップを作成中...');
  try{
    // 全小説データを最新に同期してから収集
    const novels = JSON.parse(JSON.stringify(state.library));

    // 各小説の背景画像dataURLをIndexedDBから取得してnovelに埋め込む
    for(const novel of novels){
      try{
        const dataUrl = await imgDbGet(novelBgKey(novel.id));
        if(dataUrl) novel._bgDataUrl = dataUrl;
      }catch(e){}
      // 挿絵（para内のimgName）のdataURLも収集
      const imgNames = new Set();
      (novel.episodes||[]).forEach(ep=>{
        (ep.pages||[]).forEach(pg=>{
          (pg.paras||[]).forEach(pa=>{
            if(pa.type==='image' && pa.imgName) imgNames.add(pa.imgName);
          });
        });
      });
      if(imgNames.size > 0){
        novel._images = {};
        for(const name of imgNames){
          try{
            const dataUrl = await imgDbGet(name);
            if(dataUrl) novel._images[name] = dataUrl;
          }catch(e){}
        }
      }
    }

    const backup = {
      version: 1,
      exportedAt: new Date().toISOString(),
      novels,
    };
    const json = JSON.stringify(backup);
    const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const fileName = `novel-backup-${date}.json`;

    let saved = false;

    // ① Web Share API でファイル共有（Googleドライブ等）
    try{
      const blob = new Blob([json], {type:'application/json'});
      const file = new File([blob], fileName, {type:'application/json'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({ files:[file], title:'小説バックアップ' });
        saved = true;
      }
    }catch(e){
      if(e.name === 'AbortError'){ return; } // ユーザーキャンセル
      console.warn('share failed, trying next method', e);
    }

    // ② blob URL でダウンロード
    if(!saved){
      try{
        const blob = new Blob([json], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url), 5000);
        showToast('バックアップファイルをダウンロードしました');
        saved = true;
      }catch(e){
        console.warn('blob download failed, trying data URI', e);
      }
    }

    // ③ data URI でダウンロード（content://環境のフォールバック）
    if(!saved){
      try{
        const b64 = btoa(unescape(encodeURIComponent(json)));
        const dataUri = 'data:application/json;base64,' + b64;
        const a = document.createElement('a');
        a.href = dataUri; a.download = fileName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        showToast('バックアップファイルをダウンロードしました');
        saved = true;
      }catch(e){
        console.warn('data URI download failed', e);
      }
    }

    // ④ 最終手段：クリップボードにコピー → メモ帳等に貼ってドライブ保存
    if(!saved){
      try{
        await navigator.clipboard.writeText(json);
        showToast('クリップボードにコピーしました。メモアプリに貼り付けて保存してください。');
        saved = true;
      }catch(e){
        console.warn('clipboard failed', e);
      }
    }

    if(!saved) showToast('バックアップに失敗しました。別の方法をお試しください。');

  }catch(e){
    console.error('backup failed',e);
    if(e.name !== 'AbortError') showToast('バックアップに失敗しました: '+e.message);
  }
}

function triggerRestore(){
  closeBackupMenu();
  if(!confirm('復元すると現在の全データが上書きされます。\nよろしいですか？')) return;
  document.getElementById('restore-file-input').click();
}

async function doRestore(input){
  const file = input.files[0];
  input.value = '';
  if(!file) return;
  showToast('復元中...');
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup.novels || !Array.isArray(backup.novels)){
      showToast('無効なバックアップファイルです');
      return;
    }

    // 現在のDBを全削除してから復元
    const db = await openDB();
    await new Promise((res,rej)=>{
      const tx = db.transaction(['libraryData','imageStore'],'readwrite');
      tx.objectStore('libraryData').clear();
      tx.objectStore('imageStore').clear();
      tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
    });

    // 各小説を復元
    for(const novel of backup.novels){
      // 背景画像を復元
      if(novel._bgDataUrl){
        await imgDbSave(novelBgKey(novel.id), novel._bgDataUrl).catch(()=>{});
        delete novel._bgDataUrl;
      }
      // 挿絵を復元
      if(novel._images){
        for(const [name, dataUrl] of Object.entries(novel._images)){
          await imgDbSave(name, dataUrl).catch(()=>{});
        }
        delete novel._images;
      }
      await libDbPut(novel);
    }

    showToast(`${backup.novels.length}冊を復元しました。再読み込みします...`);
    setTimeout(()=>location.reload(), 1500);
  }catch(e){
    console.error('restore failed',e);
    showToast('復元に失敗しました: '+e.message);
  }
}


/* ══════════════════════════════════════
   PWA: Service Worker 登録 + 自動更新検知
══════════════════════════════════════ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js')
      .then(reg=>{
        console.log('SW registered:', reg.scope);

        // 既に待機中のSWがあれば通知を表示
        if(reg.waiting){
          showUpdateBanner(reg.waiting);
        }

        // 新しいSWが見つかった時の処理
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          if(!newWorker) return;
          newWorker.addEventListener('statechange', ()=>{
            // インストール完了 & 既存SWがある = 更新版
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              showUpdateBanner(newWorker);
            }
          });
        });

        // 定期的に更新チェック（30分ごと、起動中のみ）
        setInterval(()=>{ reg.update().catch(()=>{}); }, 30*60*1000);
      })
      .catch(err=>console.warn('SW registration failed:', err));

    // SW切り替え完了時にページをリロード
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', ()=>{
      if(refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
}

function showUpdateBanner(worker){
  // 既に表示中なら何もしない
  if(document.getElementById('update-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.style.cssText = `
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:#1a1a1a;color:#fff;padding:12px 16px 12px 18px;
    border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3);
    display:flex;align-items:center;gap:12px;
    font-family:'Noto Sans JP',sans-serif;font-size:13px;
    z-index:9999;white-space:nowrap;
    animation:updBanIn .3s cubic-bezier(.25,.46,.45,.94) both;
  `;
  banner.innerHTML = `
    <span>新しいバージョンがあります</span>
    <button id="update-btn" style="
      background:#11d1d1;color:#fff;border:none;
      padding:6px 14px;border-radius:18px;
      font-family:inherit;font-size:12px;font-weight:600;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
    ">更新</button>
    <button id="update-close" style="
      background:none;border:none;color:#888;
      width:24px;height:24px;cursor:pointer;font-size:18px;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
    ">×</button>
  `;
  // アニメーション用CSS
  if(!document.getElementById('update-banner-style')){
    const st = document.createElement('style');
    st.id = 'update-banner-style';
    st.textContent = '@keyframes updBanIn{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(banner);

  document.getElementById('update-btn').onclick = ()=>{
    banner.remove();
    worker.postMessage({type:'SKIP_WAITING'});
    // controllerchange でリロードされる
  };
  document.getElementById('update-close').onclick = ()=>{
    banner.remove();
  };
}
